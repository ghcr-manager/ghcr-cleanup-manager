name: ghcr-manager
description: Inspect, analyze, and manage GitHub Container Registry packages.

inputs:
  github-token:
    description: GitHub token used for GitHub/GHCR API calls.
    required: true
    default: ${{ github.token }}
  owner:
    description: GitHub organization that owns the container package for live scans.
    required: true
  package:
    description: Container package name for live scans.
    required: true
  upload-db-artifact:
    description: Whether to upload the scan database as a workflow artifact.
    required: false
    default: "false"
  db-artifact-retention-days:
    description: Optional retention days override for uploaded database artifacts.
    required: false
    default: ""

outputs:
  db-path:
    description: Path to the SQLite database produced by scan runs.
    value: ${{ steps.prepare-db.outputs.db_path }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Build
      shell: bash
      run: npm run build

    - name: Prepare scan DB path
      id: prepare-db
      shell: bash
      env:
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        set -euo pipefail
        db_file="${{ inputs.owner }}__${{ inputs.package }}.sqlite"
        scan_uuid="$(cat /proc/sys/kernel/random/uuid)"
        db_dir="$RUNNER_TEMP/ghcr-manager/$scan_uuid"
        mkdir -p "$db_dir"
        db_path="$db_dir/$db_file"
        echo "db_file=$db_file" >> "$GITHUB_OUTPUT"
        echo "db_path=$db_path" >> "$GITHUB_OUTPUT"

    - name: Run ghcr-manager
      id: run-scan
      shell: bash
      run: |
        set -euo pipefail
        node dist/cli/index.js scan \
          --db "${{ steps.prepare-db.outputs.db_path }}" \
          --owner "${{ inputs.owner }}" \
          --package "${{ inputs.package }}" \
          --token "${{ inputs.github-token }}"

    - name: Upload DB artifact
      if: ${{ inputs.upload-db-artifact == 'true' }}
      uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
      with:
        name: ${{ steps.prepare-db.outputs.db_file }}
        path: ${{ steps.prepare-db.outputs.db_path }}
        retention-days:
          ${{ inputs.db-artifact-retention-days != '' && inputs.db-artifact-retention-days || github.retention_days }}
