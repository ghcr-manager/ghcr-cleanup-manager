name: GHCR Cleanup Manager
description: >
  GHCR cleanup action for GitHub Container Registry package. Handles multi-arch, provenance attestation, and cosign
  signature.

branding:
  icon: package
  color: blue

inputs:
  command:
    description: Action command to run (`scan` or `cleanup`)
    required: true
  token:
    description: GitHub token used for GitHub/GHCR API calls
    required: true
    default: ${{ github.token }}
  owner:
    description: GitHub owner of the container package (user or org)
    required: true
  package:
    description: Container package name.
    required: true
  db-path:
    description: Optional local SQLite DB path to use instead of creating a fresh runner-temp DB file
    required: false
    default: ""
  upload-artifacts:
    description: Whether to upload action-produced artifacts
    required: false
    default: "false"
  scan-after-cleanup:
    description: Whether live cleanup should run a second full scan so the DB reflects post-mutation state
    required: false
    default: "false"
  db-artifact-retention-days:
    description: Optional retention days override for uploaded database artifacts
    required: false
    default: ""
  delete-tags:
    description: Optional newline-separated tags to delete during cleanup
    required: false
    default: ""
  exclude-tags:
    description: Optional newline-separated tags to exclude from cleanup
    required: false
    default: ""
  keep-n-tagged:
    description: Optional number of tagged roots to keep during cleanup
    required: false
    default: ""
  keep-n-untagged:
    description: Optional number of untagged roots to keep during cleanup
    required: false
    default: ""
  delete-untagged:
    description: Whether cleanup should target untagged roots
    required: false
    default: "false"
  delete-ghost-images:
    description: Whether cleanup should target ghost multi-arch roots
    required: false
    default: "false"
  delete-partial-images:
    description: Whether cleanup should target partial multi-arch roots
    required: false
    default: "false"
  delete-orphaned-images:
    description: Whether cleanup should target orphaned digest-derived tags
    required: false
    default: "false"
  older-than:
    description: Optional age cutoff for cleanup selectors
    required: false
    default: ""
  use-regex:
    description: Whether cleanup tag selectors should be treated as regular expressions
    required: false
    default: "false"
  dry-run:
    description: Whether cleanup should simulate changes without mutating GHCR
    required: false
    default: "false"
  log-level:
    description: Log level passed to the shared CLI
    required: false
    default: info

outputs:
  db-path:
    description: Path to the SQLite database in the GitHub action runner
    value: ${{ steps.prepare-db.outputs.db_path }}
  summary-json-path:
    description: Path to the command summary JSON file for commands that emit one
    value: ${{ inputs.command == 'cleanup' && steps.prepare-cleanup.outputs.summary_path }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        npm ci

    - name: Build ghcr-cleanup-manager
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        npm run build

    - name: Validate action command
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.command }}" in
          scan|cleanup) ;;
          *)
            echo "Unsupported command '${{ inputs.command }}'. Expected 'scan' or 'cleanup'." >&2
            exit 1
            ;;
        esac

    - name: Resolve artifact upload intent
      id: resolve-upload
      shell: bash
      run: |
        set -euo pipefail
        upload_artifacts="${{ inputs.upload-artifacts }}"
        if [[ "${{ inputs.command }}" == "scan" ]]; then
          upload_artifacts="true"
        fi
        echo "upload_artifacts=$upload_artifacts" >> "$GITHUB_OUTPUT"

    - name: Prepare scan DB path
      id: prepare-db
      if: ${{ inputs.command == 'scan' || inputs.command == 'cleanup' }}
      shell: bash
      env:
        INPUT_DB_PATH: ${{ inputs.db-path }}
        OWNER: ${{ inputs.owner }}
        PACKAGE: ${{ inputs.package }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        set -euo pipefail
        node tools/action/prepare-db-path.mjs

    - name: Scan before command
      id: scan-before
      if: ${{ inputs.command == 'scan' || inputs.command == 'cleanup' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        scan_args=(
          --db "${{ steps.prepare-db.outputs.db_path }}"
          --log-level "${{ inputs.log-level }}"
          --owner "${{ inputs.owner }}"
          --package "${{ inputs.package }}"
          --token "${{ inputs.token }}"
          --github-output "$GITHUB_OUTPUT"
        )
        npm run ghcr-cleanup-manager:dist -- scan \
          "${scan_args[@]}"

    - name: Prepare cleanup args
      id: prepare-cleanup
      if: ${{ inputs.command == 'cleanup' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        DELETE_TAGS: ${{ inputs.delete-tags }}
        DELETE_UNTAGGED: ${{ inputs.delete-untagged }}
        DELETE_GHOST_IMAGES: ${{ inputs.delete-ghost-images }}
        DELETE_ORPHANED_IMAGES: ${{ inputs.delete-orphaned-images }}
        DELETE_PARTIAL_IMAGES: ${{ inputs.delete-partial-images }}
        DB_PATH: ${{ steps.prepare-db.outputs.db_path }}
        DRY_RUN: ${{ inputs.dry-run }}
        EXCLUDE_TAGS: ${{ inputs.exclude-tags }}
        KEEP_N_TAGGED: ${{ inputs.keep-n-tagged }}
        KEEP_N_UNTAGGED: ${{ inputs.keep-n-untagged }}
        LOG_LEVEL: ${{ inputs.log-level }}
        OLDER_THAN: ${{ inputs.older-than }}
        OWNER: ${{ inputs.owner }}
        PACKAGE: ${{ inputs.package }}
        RUNNER_TEMP: ${{ runner.temp }}
        TOKEN: ${{ inputs.token }}
        USE_REGEX: ${{ inputs.use-regex }}
      run: |
        set -euo pipefail
        node tools/action/prepare-cleanup-args.mjs

    - name: Run cleanup
      id: run-cleanup
      if: ${{ inputs.command == 'cleanup' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        mapfile -d '' -t cleanup_args < "${{ steps.prepare-cleanup.outputs.args_path }}"
        printf 'Running CLI command: ghcr-cleanup-manager cleanup'
        printf ' %q' "${cleanup_args[@]}"
        printf '\n'
        npm run --silent ghcr-cleanup-manager:dist -- cleanup "${cleanup_args[@]}"
        cat "${{ steps.prepare-cleanup.outputs.summary_path }}" | jq . >&2

    - name: Scan after live cleanup
      id: scan-after
      if: ${{ inputs.command == 'cleanup' && inputs.dry-run != 'true' && inputs.scan-after-cleanup == 'true' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        npm run ghcr-cleanup-manager:dist -- scan \
          --db "${{ steps.prepare-db.outputs.db_path }}" \
          --log-level "${{ inputs.log-level }}" \
          --owner "${{ inputs.owner }}" \
          --package "${{ inputs.package }}" \
          --token "${{ inputs.token }}" \
          --github-output "$GITHUB_OUTPUT"

    - name: Upload DB artifact
      id: upload
      if:
        ${{ (inputs.command == 'scan' || inputs.command == 'cleanup') && steps.resolve-upload.outputs.upload_artifacts
        == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ steps.prepare-db.outputs.db_file }}
        path: ${{ steps.prepare-db.outputs.db_path }}
        retention-days:
          ${{ inputs.db-artifact-retention-days != '' && inputs.db-artifact-retention-days || github.retention_days }}

    - name: Upload cleanup summary artifact
      if: ${{ inputs.command == 'cleanup' && steps.resolve-upload.outputs.upload_artifacts == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ steps.prepare-cleanup.outputs.summary_file }}
        path: ${{ steps.prepare-cleanup.outputs.summary_path }}
        retention-days:
          ${{ inputs.db-artifact-retention-days != '' && inputs.db-artifact-retention-days || github.retention_days }}

    - name: Write cleanup step summary
      if: ${{ inputs.command == 'cleanup' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        node tools/action/write-cleanup-step-summary.mjs \
          --step-summary-path "$GITHUB_STEP_SUMMARY" \
          --summary-json-path "${{ steps.prepare-cleanup.outputs.summary_path }}"
