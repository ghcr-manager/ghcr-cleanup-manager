name: ghcr-manager
description: Inspect, analyze, and manage GitHub Container Registry packages.

branding:
  icon: package
  color: blue

inputs:
  command:
    description: Action command to run (`scan`, `cleanup`, or `untag`)
    required: true
  github-token:
    description: GitHub token used for GitHub/GHCR API calls
    required: true
    default: ${{ github.token }}
  owner:
    description: GitHub owner of the container package (user or org)
    required: true
  package:
    description: Container package name.
    required: true
  db-path:
    description: Optional local SQLite DB path to use instead of creating a fresh runner-temp DB file
    required: false
    default: ""
  upload-db-artifact:
    description: Whether to upload the database as a workflow run artifact; unsupported by `untag`
    required: false
    default: "false"
  scan-after-cleanup:
    description:
      Whether live cleanup should run a second full scan so the DB reflects post-mutation state; unsupported by `untag`
    required: false
    default: "false"
  db-artifact-retention-days:
    description: Optional retention days override for uploaded database artifacts
    required: false
    default: ""
  delete-tags:
    description: Optional newline-separated tags to delete during cleanup or untag
    required: false
    default: ""
  exclude-tags:
    description: Optional newline-separated tags to exclude from cleanup
    required: false
    default: ""
  keep-n-tagged:
    description: Optional number of tagged roots to keep during cleanup
    required: false
    default: ""
  keep-n-untagged:
    description: Optional number of untagged roots to keep during cleanup
    required: false
    default: ""
  delete-untagged:
    description: Whether cleanup should target untagged roots
    required: false
    default: "false"
  delete-ghost-images:
    description: Whether cleanup should target ghost multi-arch roots
    required: false
    default: "false"
  delete-partial-images:
    description: Whether cleanup should target partial multi-arch roots
    required: false
    default: "false"
  delete-orphaned-images:
    description: Whether cleanup should target orphaned digest-derived tags
    required: false
    default: "false"
  older-than:
    description: Optional age cutoff for cleanup selectors
    required: false
    default: ""
  use-regex:
    description: Whether cleanup tag selectors should be treated as regular expressions
    required: false
    default: "false"
  dry-run:
    description: Whether cleanup or untag should simulate changes without mutating GHCR
    required: false
    default: "false"
  log-level:
    description: Log level passed to the shared CLI
    required: false
    default: info

outputs:
  db-path:
    description: Path to the SQLite database in the GitHub action runner
    value: ${{ steps.prepare-db.outputs.db_path }}
  summary-json:
    description: Machine-readable command summary JSON for commands that emit one
    value: ${{ steps.publish-summary-output.outputs.summary_json }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        npm ci

    - name: Build ghcr-manager
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        npm run build

    - name: Validate action command
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.command }}" in
          scan|cleanup|untag) ;;
          *)
            echo "Unsupported command '${{ inputs.command }}'. Expected 'scan', 'cleanup', or 'untag'." >&2
            exit 1
            ;;
        esac

    - name: Validate untag command inputs
      if: ${{ inputs.command == 'untag' }}
      shell: bash
      env:
        DB_PATH: ${{ inputs.db-path }}
        DELETE_TAGS: ${{ inputs.delete-tags }}
        DELETE_UNTAGGED: ${{ inputs.delete-untagged }}
        DELETE_GHOST_IMAGES: ${{ inputs.delete-ghost-images }}
        DELETE_ORPHANED_IMAGES: ${{ inputs.delete-orphaned-images }}
        DELETE_PARTIAL_IMAGES: ${{ inputs.delete-partial-images }}
        EXCLUDE_TAGS: ${{ inputs.exclude-tags }}
        KEEP_N_TAGGED: ${{ inputs.keep-n-tagged }}
        KEEP_N_UNTAGGED: ${{ inputs.keep-n-untagged }}
        OLDER_THAN: ${{ inputs.older-than }}
        SCAN_AFTER_CLEANUP: ${{ inputs.scan-after-cleanup }}
        UPLOAD_DB_ARTIFACT: ${{ inputs.upload-db-artifact }}
        USE_REGEX: ${{ inputs.use-regex }}
      run: |
        set -euo pipefail
        [[ -n "$DELETE_TAGS" ]] || { echo "command 'untag' requires delete-tags." >&2; exit 1; }
        [[ -z "$DB_PATH" ]] || { echo "command 'untag' does not support db-path." >&2; exit 1; }
        [[ "$UPLOAD_DB_ARTIFACT" == "false" ]] || { echo "command 'untag' does not support upload-db-artifact." >&2; exit 1; }
        [[ "$SCAN_AFTER_CLEANUP" == "false" ]] || { echo "command 'untag' does not support scan-after-cleanup." >&2; exit 1; }
        [[ -z "$EXCLUDE_TAGS" ]] || { echo "command 'untag' does not support exclude-tags." >&2; exit 1; }
        [[ -z "$KEEP_N_TAGGED" ]] || { echo "command 'untag' does not support keep-n-tagged." >&2; exit 1; }
        [[ -z "$KEEP_N_UNTAGGED" ]] || { echo "command 'untag' does not support keep-n-untagged." >&2; exit 1; }
        [[ -z "$OLDER_THAN" ]] || { echo "command 'untag' does not support older-than." >&2; exit 1; }
        [[ "$DELETE_UNTAGGED" == "false" ]] || { echo "command 'untag' does not support delete-untagged." >&2; exit 1; }
        [[ "$DELETE_GHOST_IMAGES" == "false" ]] || { echo "command 'untag' does not support delete-ghost-images." >&2; exit 1; }
        [[ "$DELETE_PARTIAL_IMAGES" == "false" ]] || { echo "command 'untag' does not support delete-partial-images." >&2; exit 1; }
        [[ "$DELETE_ORPHANED_IMAGES" == "false" ]] || { echo "command 'untag' does not support delete-orphaned-images." >&2; exit 1; }
        [[ "$USE_REGEX" == "false" ]] || { echo "command 'untag' does not support use-regex." >&2; exit 1; }

    - name: Resolve DB artifact upload intent
      id: resolve-upload
      shell: bash
      run: |
        set -euo pipefail
        upload_db_artifact="${{ inputs.upload-db-artifact }}"
        if [[ "${{ inputs.command }}" == "scan" ]]; then
          upload_db_artifact="true"
        fi
        echo "upload_db_artifact=$upload_db_artifact" >> "$GITHUB_OUTPUT"

    - name: Prepare scan DB path
      id: prepare-db
      if: ${{ inputs.command == 'scan' || inputs.command == 'cleanup' }}
      shell: bash
      env:
        INPUT_DB_PATH: ${{ inputs.db-path }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        set -euo pipefail
        db_file="${{ inputs.owner }}__${{ inputs.package }}.sqlite"
        if [[ -n "$INPUT_DB_PATH" ]]; then
          db_path="$INPUT_DB_PATH"
          db_dir="$(dirname "$db_path")"
          db_file="$(basename "$db_path")"
        else
          db_dir="$(mktemp -d -p "$RUNNER_TEMP")"
          db_path="$db_dir/$db_file"
        fi
        mkdir -p "$db_dir"
        echo "db_file=$db_file" >> "$GITHUB_OUTPUT"
        echo "db_path=$db_path" >> "$GITHUB_OUTPUT"

    - name: Scan before command
      id: scan-before
      if: ${{ inputs.command == 'scan' || inputs.command == 'cleanup' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        scan_args=(
          --db "${{ steps.prepare-db.outputs.db_path }}"
          --log-level "${{ inputs.log-level }}"
          --owner "${{ inputs.owner }}"
          --package "${{ inputs.package }}"
          --token "${{ inputs.github-token }}"
          --github-output "$GITHUB_OUTPUT"
        )
        npm run ghcr-manager:dist -- scan \
          "${scan_args[@]}"

    - name: Run cleanup
      id: run-cleanup
      if: ${{ inputs.command == 'cleanup' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        DELETE_TAGS: ${{ inputs.delete-tags }}
        DELETE_UNTAGGED: ${{ inputs.delete-untagged }}
        DELETE_GHOST_IMAGES: ${{ inputs.delete-ghost-images }}
        DELETE_ORPHANED_IMAGES: ${{ inputs.delete-orphaned-images }}
        DELETE_PARTIAL_IMAGES: ${{ inputs.delete-partial-images }}
        DRY_RUN: ${{ inputs.dry-run }}
        EXCLUDE_TAGS: ${{ inputs.exclude-tags }}
        KEEP_N_TAGGED: ${{ inputs.keep-n-tagged }}
        KEEP_N_UNTAGGED: ${{ inputs.keep-n-untagged }}
        OLDER_THAN: ${{ inputs.older-than }}
        USE_REGEX: ${{ inputs.use-regex }}
      run: |
        set -euo pipefail

        cleanup_args=(
          --db "${{ steps.prepare-db.outputs.db_path }}"
          --log-level "${{ inputs.log-level }}"
          --owner "${{ inputs.owner }}"
          --package "${{ inputs.package }}"
        )

        if [[ "$DRY_RUN" == "true" ]]; then
          cleanup_args+=(--dry-run)
        else
          cleanup_args+=(--token "${{ inputs.github-token }}")
        fi

        if [[ "$DELETE_UNTAGGED" == "true" ]]; then
          cleanup_args+=(--delete-untagged)
        fi
        if [[ "$DELETE_GHOST_IMAGES" == "true" ]]; then
          cleanup_args+=(--delete-ghost-images)
        fi
        if [[ "$DELETE_PARTIAL_IMAGES" == "true" ]]; then
          cleanup_args+=(--delete-partial-images)
        fi
        if [[ "$DELETE_ORPHANED_IMAGES" == "true" ]]; then
          cleanup_args+=(--delete-orphaned-images)
        fi
        if [[ "$USE_REGEX" == "true" ]]; then
          cleanup_args+=(--use-regex)
        fi
        if [[ -n "$KEEP_N_TAGGED" ]]; then
          cleanup_args+=(--keep-n-tagged "$KEEP_N_TAGGED")
        fi
        if [[ -n "$KEEP_N_UNTAGGED" ]]; then
          cleanup_args+=(--keep-n-untagged "$KEEP_N_UNTAGGED")
        fi
        if [[ -n "$OLDER_THAN" ]]; then
          cleanup_args+=(--older-than "$OLDER_THAN")
        fi

        append_line_args() {
          local option="$1"
          local raw_values="$2"
          local value=""
          if [[ -z "$raw_values" ]]; then
            return
          fi
          while IFS= read -r value || [[ -n "$value" ]]; do
            # left and right trim
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            if [[ -n "$value" ]]; then
              cleanup_args+=("$option" "$value")
            fi
          done <<< "$raw_values"
        }

        append_line_args --delete-tag "$DELETE_TAGS"
        append_line_args --exclude-tag "$EXCLUDE_TAGS"

        cleanup_summary_json="$(npm run --silent ghcr-manager:dist -- cleanup "${cleanup_args[@]}")"
        printf '%s\n' "$cleanup_summary_json" | jq . >&2

        {
          echo "COMMAND_SUMMARY_JSON<<EOF"
          printf '%s\n' "$cleanup_summary_json"
          echo "EOF"
        } >> "$GITHUB_ENV"

    - name: Run untag
      if: ${{ inputs.command == 'untag' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        DELETE_TAGS: ${{ inputs.delete-tags }}
      run: |
        set -euo pipefail

        untag_args=(
          --log-level "${{ inputs.log-level }}"
          --owner "${{ inputs.owner }}"
          --package "${{ inputs.package }}"
          --token "${{ inputs.github-token }}"
        )

        if [[ "${{ inputs.dry-run }}" == "true" ]]; then
          untag_args+=(--dry-run)
        fi

        while IFS= read -r value || [[ -n "$value" ]]; do
          value="${value#"${value%%[![:space:]]*}"}"
          value="${value%"${value##*[![:space:]]}"}"
          if [[ -n "$value" ]]; then
            untag_args+=(--tag "$value")
          fi
        done <<< "$DELETE_TAGS"

        summary_json="$(npm run --silent ghcr-manager:dist -- untag "${untag_args[@]}")"
        printf '%s\n' "$summary_json" | jq . >&2

        {
          echo "COMMAND_SUMMARY_JSON<<EOF"
          printf '%s\n' "$summary_json"
          echo "EOF"
        } >> "$GITHUB_ENV"

    - name: Publish command summary output
      id: publish-summary-output
      if: ${{ inputs.command == 'cleanup' || inputs.command == 'untag' }}
      shell: bash
      env:
        COMMAND_SUMMARY_JSON: ${{ env.COMMAND_SUMMARY_JSON }}
      run: |
        set -euo pipefail
        {
          echo "summary_json<<EOF"
          printf '%s\n' "$COMMAND_SUMMARY_JSON"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Write cleanup summary JSON file
      id: write-cleanup-summary-json
      if: ${{ inputs.command == 'cleanup' }}
      shell: bash
      env:
        DB_PATH: ${{ steps.prepare-db.outputs.db_path }}
        COMMAND_SUMMARY_JSON: ${{ env.COMMAND_SUMMARY_JSON }}
      run: |
        set -euo pipefail
        summary_path="${DB_PATH}--cleanup-summary.json"
        summary_file="$(basename "$summary_path")"
        printf '%s\n' "$COMMAND_SUMMARY_JSON" > "$summary_path"
        echo "summary_file=$summary_file" >> "$GITHUB_OUTPUT"
        echo "summary_path=$summary_path" >> "$GITHUB_OUTPUT"

    - name: Scan after live cleanup
      id: scan-after
      if: ${{ inputs.command == 'cleanup' && inputs.dry-run != 'true' && inputs.scan-after-cleanup == 'true' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        npm run ghcr-manager:dist -- scan \
          --db "${{ steps.prepare-db.outputs.db_path }}" \
          --log-level "${{ inputs.log-level }}" \
          --owner "${{ inputs.owner }}" \
          --package "${{ inputs.package }}" \
          --token "${{ inputs.github-token }}" \
          --github-output "$GITHUB_OUTPUT"

    - name: Upload DB artifact
      if:
        ${{ (inputs.command == 'scan' || inputs.command == 'cleanup') && steps.resolve-upload.outputs.upload_db_artifact
        == 'true' }}
      uses: ./.github/actions/upload-db-artifact
      with:
        db-path: ${{ steps.prepare-db.outputs.db_path }}
        db-file: ${{ steps.prepare-db.outputs.db_file }}
        db-artifact-retention-days: ${{ inputs.db-artifact-retention-days }}

    - name: Upload cleanup summary artifact
      if: ${{ inputs.command == 'cleanup' && steps.resolve-upload.outputs.upload_db_artifact == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ steps.write-cleanup-summary-json.outputs.summary_file }}
        path: ${{ steps.write-cleanup-summary-json.outputs.summary_path }}
        retention-days:
          ${{ inputs.db-artifact-retention-days != '' && inputs.db-artifact-retention-days || github.retention_days }}

    - name: Write cleanup step summary
      if: ${{ inputs.command == 'cleanup' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        CLEANUP_SUMMARY_JSON: ${{ env.COMMAND_SUMMARY_JSON }}
      run: |
        set -euo pipefail
        node tools/write-cleanup-step-summary.mjs \
          --step-summary-path "$GITHUB_STEP_SUMMARY"
