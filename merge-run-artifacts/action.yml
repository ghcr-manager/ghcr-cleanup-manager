name: ghcr-manager merge-run-artifacts
description:
  Download matching current-run DB artifacts, merge them, upload the merged DB, and optionally delete the source
  artifacts.

branding:
  icon: package
  color: blue

inputs:
  artifact-name-pattern:
    description: Regular expression used to select current-run artifact names for download and optional deletion
    required: false
    default: \.sqlite$
  db-file:
    description: Artifact filename and local filename for the merged database
    required: false
    default: ghcr-manager-merged.sqlite
  upload-db-artifact:
    description: Whether to upload the merged database as a workflow run artifact
    required: false
    default: "true"
  db-artifact-retention-days:
    description: Optional retention days override for uploaded database artifacts
    required: false
    default: ""
  delete-source-artifacts:
    description: Whether to delete the matching source artifacts from the current workflow run after a successful merge
    required: false
    default: "true"
  log-level:
    description: Log level passed through to the nested db-merge action
    required: false
    default: info

outputs:
  db-path:
    description: Path to the merged SQLite database in the GitHub action runner
    value: ${{ steps.merge.outputs.db-path }}
  artifact-id:
    description: Artifact ID returned by the nested db-merge upload
    value: ${{ steps.merge.outputs.artifact-id }}
  artifact-url:
    description: Artifact download URL returned by the nested db-merge upload
    value: ${{ steps.merge.outputs.artifact-url }}
  artifact-digest:
    description: Artifact digest returned by the nested db-merge upload
    value: ${{ steps.merge.outputs.artifact-digest }}

runs:
  using: composite
  steps:
    - name: Download matching run artifacts
      id: download
      shell: bash
      env:
        ARTIFACT_NAME_PATTERN: ${{ inputs.artifact-name-pattern }}
        GH_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        set -euo pipefail

        extract_dir="$(tools/download-run-artifacts.sh)"
        echo "extract_dir=$extract_dir" >> "$GITHUB_OUTPUT"

    - name: Merge DB artifacts
      id: merge
      uses: ./db-merge
      with:
        source-db-dir: ${{ steps.download.outputs.extract_dir }}
        db-file: ${{ inputs.db-file }}
        upload-db-artifact: ${{ inputs.upload-db-artifact }}
        db-artifact-retention-days: ${{ inputs.db-artifact-retention-days }}
        log-level: ${{ inputs.log-level }}

    - name: Delete source artifacts
      if: ${{ inputs.delete-source-artifacts == 'true' }}
      shell: bash
      env:
        ARTIFACT_NAME_PATTERN: ${{ inputs.artifact-name-pattern }}
        EXCLUDE_ARTIFACT_ID: ${{ steps.merge.outputs.artifact-id }}
        GH_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
      run: |
        set -euo pipefail
        tools/delete-run-artifacts.sh
