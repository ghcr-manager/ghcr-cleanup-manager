name: ghcr-manager merge-run-artifacts
description:
  Download matching current-run DB artifacts, merge them, upload the merged DB, and optionally delete the source
  artifacts.

branding:
  icon: package
  color: blue

inputs:
  artifact-name-pattern:
    description: Regular expression used to select current-run artifact names for download and optional deletion
    required: false
    default: \.sqlite$
  db-file:
    description: Artifact filename and local filename for the merged database
    required: false
    default: ghcr-manager-merged.sqlite
  upload-artifacts:
    description: Whether to upload the merged database as a workflow run artifact
    required: false
    default: "true"
  db-artifact-retention-days:
    description: Optional retention days override for uploaded database artifacts
    required: false
    default: ""
  delete-source-artifacts:
    description: Whether to delete the matching source artifacts from the current workflow run after a successful merge
    required: false
    default: "true"
  log-level:
    description: Log level passed through to the nested db-merge action
    required: false
    default: info

outputs:
  db-path:
    description: Path to the merged SQLite database in the GitHub action runner
    value: ${{ steps.prepare-db.outputs.db_path }}
  artifact-id:
    description: Artifact ID returned by the merged DB upload
    value: ${{ steps.upload.outputs.artifact-id }}
  artifact-url:
    description: Artifact download URL returned by the merged DB upload
    value: ${{ steps.upload.outputs.artifact-url }}
  artifact-digest:
    description: Artifact digest returned by the merged DB upload
    value: ${{ steps.upload.outputs.artifact-digest }}

runs:
  using: composite
  steps:
    - name: Download matching run artifacts
      id: download
      shell: bash
      env:
        ARTIFACT_NAME_PATTERN: ${{ inputs.artifact-name-pattern }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        set -euo pipefail

        action_repo_root="$(cd "$GITHUB_ACTION_PATH/.." && pwd)"
        extract_dir="$("$action_repo_root/tools/download-run-artifacts.sh")"
        echo "extract_dir=$extract_dir" >> "$GITHUB_OUTPUT"

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        npm ci

    - name: Build ghcr-manager
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        npm run build

    - name: Prepare merge DB path
      id: prepare-db
      shell: bash
      env:
        INPUT_DB_FILE: ${{ inputs.db-file }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        set -euo pipefail
        db_dir="$(mktemp -d -p "$RUNNER_TEMP")"
        db_path="$db_dir/$INPUT_DB_FILE"
        echo "db_path=$db_path" >> "$GITHUB_OUTPUT"

    - name: Merge DB artifacts
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        SOURCE_DB_DIR: ${{ steps.download.outputs.extract_dir }}
      run: |
        set -euo pipefail

        mapfile -t source_db_paths < <(find "$SOURCE_DB_DIR" -maxdepth 2 -type f -name '*.sqlite' | sort)
        if [[ "${#source_db_paths[@]}" -eq 0 ]]; then
          echo "No SQLite source DBs found under $SOURCE_DB_DIR." >&2
          exit 1
        fi

        merge_args=(
          --db "${{ steps.prepare-db.outputs.db_path }}"
        )

        for source_db_path in "${source_db_paths[@]}"; do
          merge_args+=(--source-db "$source_db_path")
        done

        npm run ghcr-manager:dist -- db-merge "${merge_args[@]}"

    - name: Upload DB artifact
      id: upload
      if: ${{ inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.db-file }}
        path: ${{ steps.prepare-db.outputs.db_path }}
        retention-days:
          ${{ inputs.db-artifact-retention-days != '' && inputs.db-artifact-retention-days || github.retention_days }}

    - name: Delete source artifacts
      if: ${{ inputs.delete-source-artifacts == 'true' }}
      shell: bash
      env:
        ARTIFACT_NAME_PATTERN: ${{ inputs.artifact-name-pattern }}
        EXCLUDE_ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
      run: |
        set -euo pipefail
        action_repo_root="$(cd "$GITHUB_ACTION_PATH/.." && pwd)"
        "$action_repo_root/tools/delete-run-artifacts.sh"
