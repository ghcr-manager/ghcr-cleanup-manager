name: Test Registry Build Image
description: Build, push, and smoke-test one architecture image.

inputs:
  image_ref:
    description: Image reference to push the temporary architecture image to.
    required: true
  context:
    description: Optional build context directory.
    required: false
    default: .
  arch:
    description: Architecture label used in the temporary image tag.
    required: true
  dockerfile:
    description: Optional Dockerfile path or URL.
    required: false
    default: https://raw.githubusercontent.com/gh-workflow/multiarch-image-publish/main/tests/build/Dockerfile
  platform:
    description: Docker platform to build.
    required: true
  registry_username:
    description: GHCR username used for docker login.
    required: true
  registry_password:
    description: GHCR token or password used for docker login.
    required: true

outputs:
  digest:
    description: Pushed image digest.
    value: ${{ steps.build.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Set up Buildx
      uses: ./.github/actions/test-setup-buildx

    - name: Log in to GHCR
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ inputs.registry_username }}
        password: ${{ inputs.registry_password }}

    - name: Build image
      id: build
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        provenance: true
        platforms: ${{ inputs.platform }}
        # Temporary image tag for build/test; final tags are published later.
        tags: ${{ inputs.image_ref }}:${{ github.run_id }}-${{ inputs.arch }}-test

    - name: Split image ref
      shell: bash
      run: |
        image_ref="${{ inputs.image_ref }}"   # ghcr.io/OWNER/PACKAGE
        without_registry="${image_ref#ghcr.io/}"
        owner="${without_registry%%/*}"
        package="${without_registry#*/}"

        echo "OWNER=$owner" >> "$GITHUB_ENV"
        echo "PACKAGE=$package" >> "$GITHUB_ENV"

    - name: Remove temporary tag on image
      uses: ghcr-manager/ghcr-untag-action@6691a653f421749a921a1ce0e63fec76bf2748a9 # v1.0.7
      with:
        token: ${{ inputs.registry_password }}
        owner: ${{ env.OWNER }}
        package: ${{ env.PACKAGE }}
        tags: ${{ github.run_id }}-${{ inputs.arch }}-test
