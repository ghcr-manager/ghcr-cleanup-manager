name: Test Scenario Executor ghcrctl
description: Run one scenario cleanup using ghcrctl.

inputs:
  token:
    description: GitHub token with package permissions.
    required: true
  owner:
    description: Test owner.
    required: true
  package_name:
    description: Scenario package name.
    required: true
  resolution_path:
    description: Path to the resolved scenario JSON.
    required: true
  summary_path:
    description: Path where a short executor summary should be written.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Go for ghcrctl
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version: "1.25.9"

    - name: Install ghcrctl
      shell: bash
      run: |
        set -euo pipefail
        go install github.com/mkoepf/ghcrctl@c192fc146886baa98239fe046f73bce818766416

    - name: Execute with ghcrctl
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        OWNER: ${{ inputs.owner }}
        PACKAGE: ${{ inputs.package_name }}
        RESOLUTION_PATH: ${{ inputs.resolution_path }}
      run: |
        set -euo pipefail
        ghcrctl_tag="$(jq -r '.executorConfig.inputs["delete-tags"] // ""' "$RESOLUTION_PATH")"
        [[ "$ghcrctl_tag" != *,* ]] || { echo "ghcrctl requires exactly one delete tag" >&2; exit 1; }
        [[ -n "$ghcrctl_tag" ]] || { echo "Scenario does not define a ghcrctl tag target" >&2; exit 1; }
        ghcrctl delete graph "${OWNER}/${PACKAGE}" --tag "$ghcrctl_tag" --force

    - name: Record ghcrctl executor summary
      shell: bash
      env:
        SUMMARY_PATH: ${{ inputs.summary_path }}
      run: |
        set -euo pipefail
        printf '%s\n' '{"executor":"ghcrctl","status":"completed"}' > "$SUMMARY_PATH"
