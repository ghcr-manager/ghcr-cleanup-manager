name: Test Scenario Executor chizkiyahu
description: Run one scenario cleanup using Chizkiyahu/delete-untagged-ghcr-action.

inputs:
  token:
    description: GitHub token with package permissions.
    required: true
  owner:
    description: Test owner.
    required: true
  package_name:
    description: Scenario package name.
    required: true
  resolution_path:
    description: Path to the resolved scenario JSON.
    required: true
  summary_path:
    description: Path where a short executor summary should be written.
    required: true

runs:
  using: composite
  steps:
    - name: Resolve chizkiyahu inputs
      id: cleanup-inputs
      shell: bash
      env:
        RESOLUTION_PATH: ${{ inputs.resolution_path }}
      run: |
        set -euo pipefail
        delete_untagged="$(jq -r '.executorConfig.inputs["delete-untagged"] // ""' "$RESOLUTION_PATH")"
        if [[ "$delete_untagged" != "true" ]]; then
          echo "chizkiyahu executor currently supports only delete-untagged scenarios" >&2
          exit 1
        fi
        echo "untagged_only=true" >> "$GITHUB_OUTPUT"
        echo "except_untagged_multiplatform=true" >> "$GITHUB_OUTPUT"

    - name: Execute with Chizkiyahu/delete-untagged-ghcr-action
      uses: Chizkiyahu/delete-untagged-ghcr-action@707cf4f1445ec3e3f5c7bfc83a023fb868cd1174 # v6.1.1
      with:
        token: ${{ inputs.token }}
        repository_owner: ${{ inputs.owner }}
        repository: ""
        package_name: ${{ inputs.package_name }}
        untagged_only: ${{ steps.cleanup-inputs.outputs.untagged_only }}
        except_untagged_multiplatform: ${{ steps.cleanup-inputs.outputs.except_untagged_multiplatform }}
        with_sigs: "true"
        owner_type: org

    - name: Record chizkiyahu executor summary
      shell: bash
      env:
        SUMMARY_PATH: ${{ inputs.summary_path }}
      run: |
        set -euo pipefail
        printf '%s\n' '{"executor":"chizkiyahu","status":"completed"}' > "$SUMMARY_PATH"
