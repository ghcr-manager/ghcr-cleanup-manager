name: upload-db-artifact
description: Upload a ghcr-manager SQLite DB artifact.

inputs:
  db-path:
    description: Local SQLite DB path to upload
    required: true
  db-file:
    description: Artifact filename to upload
    required: true
  db-artifact-retention-days:
    description: Optional retention days override for uploaded database artifacts
    required: false
    default: ""

outputs:
  artifact-id:
    description: Artifact ID returned by actions/upload-artifact
    value: ${{ steps.upload.outputs.artifact-id }}
  artifact-url:
    description: Artifact download URL returned by actions/upload-artifact
    value: ${{ steps.upload.outputs.artifact-url }}
  artifact-digest:
    description: Artifact digest returned by actions/upload-artifact
    value: ${{ steps.upload.outputs.artifact-digest }}

runs:
  using: composite
  steps:
    - name: Upload DB artifact
      id: upload
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.db-file }}
        path: ${{ inputs.db-path }}
        retention-days:
          ${{ inputs.db-artifact-retention-days != '' && inputs.db-artifact-retention-days || github.retention_days }}
