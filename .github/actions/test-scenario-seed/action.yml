name: Test Scenario Seed
description: Clear and seed one minimal GHCR scenario package.

inputs:
  image_ref:
    description: Full ghcr.io image reference without tag.
    required: true
  seed_strategy:
    description: Seed strategy identifier.
    required: true
  registry_username:
    description: GHCR username used for docker login.
    required: true
  registry_password:
    description: GHCR token or password used for docker login.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Log in to GHCR
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ inputs.registry_username }}
        password: ${{ inputs.registry_password }}

    - name: Seed delete-untagged-noop
      if: ${{ inputs.seed_strategy == 'delete-untagged-noop' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: delete-untagged-noop
      run: |
        set -euo pipefail
        context_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$context_dir/Dockerfile"
        printf '%s\n' "keep-tagged" > "$context_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--keep" \
          "$context_dir"

    - name: Seed delete-untagged-real
      if: ${{ inputs.seed_strategy == 'delete-untagged-real' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: delete-untagged-real
      run: |
        set -euo pipefail

        old_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$old_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} old" > "$old_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--tracked" \
          "$old_dir"

        new_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$new_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} new" > "$new_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--tracked" \
          "$new_dir"

    - name: Seed untag-only-single-shared-root
      if: ${{ inputs.seed_strategy == 'untag-only-single-shared-root' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: untag-only-single-shared-root
      run: |
        set -euo pipefail
        context_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$context_dir/Dockerfile"
        printf '%s\n' "$SCENARIO_ID" > "$context_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--delete-me" \
          --tag "$IMAGE_REF:${SCENARIO_ID}--keep-me" \
          "$context_dir"

    - name: Prepare blocked-shared-closure contexts
      if: ${{ inputs.seed_strategy == 'blocked-shared-closure' }}
      id: blocked-contexts
      shell: bash
      env:
        SCENARIO_ID: blocked-shared-closure
      run: |
        set -euo pipefail
        base_dir="$(mktemp -d)"

        delete_dir="$base_dir/delete-amd64"
        mkdir -p "$delete_dir"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$delete_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} delete amd64" > "$delete_dir/payload.txt"

        shared_dir="$base_dir/shared-arm64"
        mkdir -p "$shared_dir"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$shared_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} shared arm64" > "$shared_dir/payload.txt"

        keep_dir="$base_dir/keep-amd64"
        mkdir -p "$keep_dir"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$keep_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} keep amd64" > "$keep_dir/payload.txt"

        echo "delete_dir=$delete_dir" >> "$GITHUB_OUTPUT"
        echo "shared_dir=$shared_dir" >> "$GITHUB_OUTPUT"
        echo "keep_dir=$keep_dir" >> "$GITHUB_OUTPUT"

    - name: Build blocked delete amd64 child
      if: ${{ inputs.seed_strategy == 'blocked-shared-closure' }}
      id: blocked-delete-amd64
      uses: ./.github/actions/test-registry-build-image
      with:
        context: ${{ steps.blocked-contexts.outputs.delete_dir }}
        dockerfile: ${{ steps.blocked-contexts.outputs.delete_dir }}/Dockerfile
        image_ref: ${{ inputs.image_ref }}
        arch: blocked-shared-closure-source-delete-amd64
        platform: linux/amd64
        registry_username: ${{ inputs.registry_username }}
        registry_password: ${{ inputs.registry_password }}

    - name: Build blocked shared arm64 child
      if: ${{ inputs.seed_strategy == 'blocked-shared-closure' }}
      id: blocked-shared-arm64
      uses: ./.github/actions/test-registry-build-image
      with:
        context: ${{ steps.blocked-contexts.outputs.shared_dir }}
        dockerfile: ${{ steps.blocked-contexts.outputs.shared_dir }}/Dockerfile
        image_ref: ${{ inputs.image_ref }}
        arch: blocked-shared-closure-source-shared-arm64
        platform: linux/arm64
        registry_username: ${{ inputs.registry_username }}
        registry_password: ${{ inputs.registry_password }}

    - name: Build blocked keep amd64 child
      if: ${{ inputs.seed_strategy == 'blocked-shared-closure' }}
      id: blocked-keep-amd64
      uses: ./.github/actions/test-registry-build-image
      with:
        context: ${{ steps.blocked-contexts.outputs.keep_dir }}
        dockerfile: ${{ steps.blocked-contexts.outputs.keep_dir }}/Dockerfile
        image_ref: ${{ inputs.image_ref }}
        arch: blocked-shared-closure-source-keep-amd64
        platform: linux/amd64
        registry_username: ${{ inputs.registry_username }}
        registry_password: ${{ inputs.registry_password }}

    - name: Publish blocked delete index
      if: ${{ inputs.seed_strategy == 'blocked-shared-closure' }}
      uses: gh-workflow/multiarch-image-publish@c5eac5dd8f7ed6b39fffc6e2c2242966b4917260 # 0.2.1
      with:
        image_ref: ${{ inputs.image_ref }}
        tags: |
          blocked-shared-closure--delete-me
        platform_digests: |
          linux/amd64=${{ steps.blocked-delete-amd64.outputs.digest }}
          linux/arm64=${{ steps.blocked-shared-arm64.outputs.digest }}
        annotations: |
          org.opencontainers.image.version=blocked-shared-closure-delete
        publish_platform_tags: "false"

    - name: Publish blocked keep index
      if: ${{ inputs.seed_strategy == 'blocked-shared-closure' }}
      uses: gh-workflow/multiarch-image-publish@c5eac5dd8f7ed6b39fffc6e2c2242966b4917260 # 0.2.1
      with:
        image_ref: ${{ inputs.image_ref }}
        tags: |
          blocked-shared-closure--keep-me
        platform_digests: |
          linux/amd64=${{ steps.blocked-keep-amd64.outputs.digest }}
          linux/arm64=${{ steps.blocked-shared-arm64.outputs.digest }}
        annotations: |
          org.opencontainers.image.version=blocked-shared-closure-keep
        publish_platform_tags: "false"

    - name: Seed untag-only-multiarch-shared-root
      if: ${{ inputs.seed_strategy == 'untag-only-multiarch-shared-root' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: untag-only-multiarch-shared-root
      run: |
        set -euo pipefail
        context_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$context_dir/Dockerfile"
        printf '%s\n' "$SCENARIO_ID" > "$context_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64,linux/arm64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--delete-me" \
          --tag "$IMAGE_REF:${SCENARIO_ID}--keep-me" \
          "$context_dir"

    - name: Seed tagged-fully-deletable
      if: ${{ inputs.seed_strategy == 'tagged-fully-deletable' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: tagged-fully-deletable
      run: |
        set -euo pipefail

        keep_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$keep_dir/Dockerfile"
        printf '%s\n' "keep-tagged" > "$keep_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--keep" \
          "$keep_dir"

        delete_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$delete_dir/Dockerfile"
        printf '%s\n' "delete-me-tagged" > "$delete_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--delete-me" \
          "$delete_dir"

    - name: Seed exclude-tag-protected-root
      if: ${{ inputs.seed_strategy == 'exclude-tag-protected-root' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: exclude-tag-protected-root
      run: |
        set -euo pipefail
        context_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$context_dir/Dockerfile"
        printf '%s\n' "$SCENARIO_ID" > "$context_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--delete-me" \
          --tag "$IMAGE_REF:${SCENARIO_ID}--keep-me" \
          "$context_dir"

    - name: Seed keep-n-tagged-overflow
      if: ${{ inputs.seed_strategy == 'keep-n-tagged-overflow' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: keep-n-tagged-overflow
      run: |
        set -euo pipefail

        oldest_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$oldest_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} oldest" > "$oldest_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--oldest" \
          "$oldest_dir"

        middle_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$middle_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} middle" > "$middle_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--middle" \
          "$middle_dir"

        newest_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$newest_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} newest" > "$newest_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--newest" \
          "$newest_dir"

    - name: Seed keep-n-untagged-overflow
      if: ${{ inputs.seed_strategy == 'keep-n-untagged-overflow' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: keep-n-untagged-overflow
      run: |
        set -euo pipefail

        oldest_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$oldest_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} oldest" > "$oldest_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--tracked" \
          "$oldest_dir"

        middle_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$middle_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} middle" > "$middle_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--tracked" \
          "$middle_dir"

        newest_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$newest_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} newest" > "$newest_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--tracked" \
          "$newest_dir"

    - name: Seed delete-tags-keep-n-tagged-overflow
      if: ${{ inputs.seed_strategy == 'delete-tags-keep-n-tagged-overflow' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: delete-tags-keep-n-tagged-overflow
      run: |
        set -euo pipefail

        keep_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$keep_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} keep" > "$keep_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--keep" \
          "$keep_dir"

        delete_old_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$delete_old_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} delete old" > "$delete_old_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--delete-old" \
          "$delete_old_dir"

        delete_new_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$delete_new_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} delete new" > "$delete_new_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--delete-new" \
          "$delete_new_dir"

    - name: Seed delete-orphaned-images-real
      if: ${{ inputs.seed_strategy == 'delete-orphaned-images-real' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: delete-orphaned-images-real
      run: |
        set -euo pipefail

        keep_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$keep_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} keep" > "$keep_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--keep" \
          "$keep_dir"

        orphan_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$orphan_dir/Dockerfile"
        printf '%s\n' "$SCENARIO_ID" > "$orphan_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:sha256-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa.sig" \
          "$orphan_dir"

    - name: Seed delete-orphaned-images-noop
      if: ${{ inputs.seed_strategy == 'delete-orphaned-images-noop' }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: delete-orphaned-images-noop
      run: |
        set -euo pipefail

        parent_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$parent_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} parent" > "$parent_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:${SCENARIO_ID}--parent" \
          "$parent_dir"

        parent_digest="$(
          docker buildx imagetools inspect "$IMAGE_REF:${SCENARIO_ID}--parent" \
            | awk '/Digest:/ {print $2; exit}'
        )"
        [[ "$parent_digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
          echo "Failed to resolve parent digest for $IMAGE_REF:${SCENARIO_ID}--parent" >&2
          exit 1
        }

        referrer_dir="$(mktemp -d)"
        cp "$GITHUB_ACTION_PATH/../../test-scenarios/minimal-image/Dockerfile" "$referrer_dir/Dockerfile"
        printf '%s\n' "${SCENARIO_ID} referrer" > "$referrer_dir/payload.txt"
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --push \
          --tag "$IMAGE_REF:sha256-${parent_digest#sha256:}.sig" \
          "$referrer_dir"

    - name: Reject unknown seed strategy
      if:
        ${{ inputs.seed_strategy != 'delete-untagged-noop' && inputs.seed_strategy != 'delete-untagged-real' &&
        inputs.seed_strategy != 'tagged-fully-deletable' && inputs.seed_strategy != 'untag-only-single-shared-root' &&
        inputs.seed_strategy != 'untag-only-multiarch-shared-root' && inputs.seed_strategy != 'blocked-shared-closure'
        && inputs.seed_strategy != 'exclude-tag-protected-root' && inputs.seed_strategy != 'keep-n-tagged-overflow' &&
        inputs.seed_strategy != 'keep-n-untagged-overflow' && inputs.seed_strategy !=
        'delete-tags-keep-n-tagged-overflow' && inputs.seed_strategy != 'delete-orphaned-images-real' &&
        inputs.seed_strategy != 'delete-orphaned-images-noop' }}
      shell: bash
      run: |
        echo "Unknown seed strategy: ${{ inputs.seed_strategy }}" >&2
        exit 1
