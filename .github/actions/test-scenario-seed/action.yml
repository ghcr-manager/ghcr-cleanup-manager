name: Test Scenario Seed
description: Clear and seed one minimal GHCR scenario package.

inputs:
  image_ref:
    description: Full ghcr.io image reference without tag.
    required: true
  seed_strategy:
    description: Seed strategy identifier.
    required: true
  registry_username:
    description: GHCR username used for docker login.
    required: true
  registry_password:
    description: GHCR token or password used for docker login.
    required: true

runs:
  using: composite
  steps:
    - name: Initialize seed marker
      shell: bash
      run: |
        set -euo pipefail
        echo "GHCR_MANAGER_SCENARIO_SEED_HANDLED=false" >> "$GITHUB_ENV"

    - name: Set up Buildx
      uses: ./.github/actions/test-setup-buildx

    - name: Log in to GHCR
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ inputs.registry_username }}
        password: ${{ inputs.registry_password }}

    - name: Install Cosign for graph-matrix scenarios
      if: ${{ startsWith(inputs.seed_strategy, 'graph-') }}
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Seed graph-matrix scenario
      if: ${{ startsWith(inputs.seed_strategy, 'graph-') }}
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        SCENARIO_ID: ${{ inputs.seed_strategy }}
      run: |
        set -euo pipefail
        echo "GHCR_MANAGER_SCENARIO_SEED_HANDLED=true" >> "$GITHUB_ENV"
        node tests/tools/seed-graph-matrix-scenario.mjs "$SCENARIO_ID" "$IMAGE_REF"

    - name: Split image ref for graph untagging
      if: ${{ startsWith(inputs.seed_strategy, 'graph-2multiarch2tags-') }}
      shell: bash
      run: |
        image_ref="${{ inputs.image_ref }}"
        without_registry="${image_ref#ghcr.io/}"
        owner="${without_registry%%/*}"
        package="${without_registry#*/}"
        echo "OWNER=$owner" >> "$GITHUB_ENV"
        echo "PACKAGE=$package" >> "$GITHUB_ENV"

    - name: Remove extra graph tags for 2multiarch2tags
      if: ${{ startsWith(inputs.seed_strategy, 'graph-2multiarch2tags-') }}
      uses: ghcr-manager/ghcr-untag-action@6691a653f421749a921a1ce0e63fec76bf2748a9 # v1.0.7
      with:
        token: ${{ inputs.registry_password }}
        owner: ${{ env.OWNER }}
        package: ${{ env.PACKAGE }}
        tags: |
          image-b
          image-c
          multiarch-b

    - name: Seed basic scenarios
      shell: bash
      run: |
        set -euo pipefail
        tests/tools/seed-basic-scenarios.sh \
          "${{ inputs.seed_strategy }}" \
          "${{ inputs.image_ref }}"

    - name: Seed broken-index scenarios
      shell: bash
      run: |
        set -euo pipefail
        tests/tools/seed-broken-index-scenarios.sh \
          "${{ inputs.seed_strategy }}" \
          "${{ inputs.image_ref }}" \
          "${{ inputs.registry_username }}" \
          "${{ inputs.registry_password }}"

    - name: Seed complex multi-arch scenarios
      if: >-
        ${{
          inputs.seed_strategy == 'blocked-shared-closure' ||
          inputs.seed_strategy == 'docker-manifest-list-untag-only-shared-root' ||
          inputs.seed_strategy == 'cosign-referrer-kept-multiarch' ||
          inputs.seed_strategy == 'cosign-referrer-kept-multiarch-index-signature'
        }}
      uses: ./.github/actions/test-scenario-seed-multiarch
      with:
        image_ref: ${{ inputs.image_ref }}
        seed_strategy: ${{ inputs.seed_strategy }}
        registry_username: ${{ inputs.registry_username }}
        registry_password: ${{ inputs.registry_password }}

    - name: Reject unhandled seed strategy
      if: ${{ env.GHCR_MANAGER_SCENARIO_SEED_HANDLED != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "Unknown seed strategy: ${{ inputs.seed_strategy }}" >&2
        exit 1
