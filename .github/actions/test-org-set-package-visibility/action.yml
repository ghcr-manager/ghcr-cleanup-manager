name: Test Org Set Package Visibility
description: Set GitHub Container Registry package visibility for the dedicated test org.

inputs:
  owner:
    description: Package owner organization.
    required: true
  package_name:
    description: Container package name.
    required: true
  github_token:
    description: Classic PAT with package admin access.
    required: true
  visibility:
    description: Target visibility.
    required: false
    default: public

runs:
  using: composite
  steps:
    - name: Set package visibility
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        OWNER: ${{ inputs.owner }}
        PACKAGE_NAME: ${{ inputs.package_name }}
        VISIBILITY: ${{ inputs.visibility }}
      run: |
        set -euo pipefail
        gh api \
          -X PATCH \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}" \
          -f visibility="$VISIBILITY" \
          --silent
