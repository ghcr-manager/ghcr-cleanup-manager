name: Test Setup Buildx
description: Set up Docker Buildx for tests with one retry for transient bootstrap failures.

runs:
  using: composite
  steps:
    - name: Set up Buildx (attempt 1)
      id: buildx-first
      continue-on-error: true
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Wait before Buildx retry
      if: ${{ steps.buildx-first.outcome == 'failure' }}
      shell: bash
      run: |
        set -euo pipefail
        sleep 5

    - name: Set up Buildx (retry)
      if: ${{ steps.buildx-first.outcome == 'failure' }}
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
