name: "CI: Release"

"on":
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  change-validation:
    uses: ./.github/workflows/ci_change-validation.yml

  verify-release-refs:
    name: Verify release references
    needs: [change-validation]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify references to current tag
        env:
          ACTION_OWNER: ${{ github.repository_owner }}
          ACTION_REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          action_ref="${ACTION_OWNER}/${ACTION_REPO}"
          if grep -nP "${action_ref}@(?!${GITHUB_REF_NAME}\\b)" \
              .github/workflows/manual-run.yml \
              README.md
          then
            echo "Found action refs not pinned to ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Verify package.json uses current tag version
        run: |
          set -euo pipefail
          if ! grep -q "\"version\": \"${GITHUB_REF_NAME}\"" package.json; then
            echo "package.json version must match tag ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  publish-npm:
    name: Publish npm package
    needs: [change-validation, verify-release-refs]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: |
          npm ci

      - name: Run tests
        run: |
          npm test

      - name: Build package
        run: |
          npm run build

      - name: Publish to npm
        run: |
          npm publish --provenance --access public

  release:
    name: Publish GitHub release
    needs: [change-validation, verify-release-refs, publish-npm]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
