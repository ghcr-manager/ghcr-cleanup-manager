name: "CI: Release"

"on":
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  change-validation:
    uses: ./.github/workflows/ci_change-validation.yml

  verify-release-refs:
    name: Verify release references
    needs: change-validation
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Verify release tag points to main
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Release tag ${GITHUB_REF_NAME} must point to a commit on origin/main." >&2
            exit 1
          fi

      - name: Verify references to current tag
        env:
          ACTION_OWNER: ${{ github.repository_owner }}
          ACTION_REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          action_ref="${ACTION_OWNER}/${ACTION_REPO}"
          if grep -nP "${action_ref}@(?!${GITHUB_REF_NAME}\\b)" \
              README.md
          then
            echo "Found action refs not pinned to ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Verify package.json uses current tag version
        run: |
          set -euo pipefail
          if ! grep -q "\"version\": \"${GITHUB_REF_NAME}\"" package.json; then
            echo "package.json version must match tag ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          if ! grep -q "\"version\": \"${GITHUB_REF_NAME}\"" visualizer/package.json; then
            echo "visualizer/package.json version must match tag ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Verify changelog contains the release version
        run: |
          set -euo pipefail
          if ! grep -q "^## \\[${GITHUB_REF_NAME}\\] - " CHANGELOG.md; then
            echo "CHANGELOG.md must contain a release heading for ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

  test-user-owner-cleanup:
    needs: verify-release-refs
    uses: ./.github/workflows/test_user-owner-cleanup.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit

  test-scenario-graph-matrix:
    needs:
      - verify-release-refs
      - test-user-owner-cleanup
    uses: ./.github/workflows/test_scenario-graph-matrix.yml
    permissions:
      contents: read
      packages: write
      actions: write
      id-token: write
    secrets: inherit
    with:
      executors: ghcr-manager

  test-scenario-executor-matrix:
    needs:
      - verify-release-refs
      - test-user-owner-cleanup
      - test-scenario-graph-matrix
    uses: ./.github/workflows/test_scenario-executor-matrix.yml
    permissions:
      contents: read
      packages: write
      actions: write
      id-token: write
    secrets: inherit
    with:
      executors: ghcr-manager

  publish-npm-packages:
    name: Publish npm packages
    needs:
      - verify-release-refs
      - test-scenario-executor-matrix
      - test-scenario-graph-matrix
      - test-user-owner-cleanup
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: |
          npm ci

      - name: Run tests
        run: |
          npm test

      - name: Build packages
        run: |
          npm run build
          npm run build --workspace visualizer

      - name: Publish ghcr-manager to npm
        run: |
          npm publish --provenance --access public

      - name: Publish ghcr-manager-visualizer to npm
        run: |
          npm publish --workspace visualizer --provenance --access public

  release:
    name: Publish GitHub release
    needs:
      - verify-release-refs
      - test-scenario-executor-matrix
      - test-scenario-graph-matrix
      - test-user-owner-cleanup
      - publish-npm-packages
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Build release scenario DB
        id: release-scenario-db
        uses: ./merge-run-artifacts
        with:
          artifact-name-glob: "*.sqlite"
          db-file: ghcr-manager-release-scenarios.sqlite
          upload-artifacts: "true"
          delete-source-artifacts: "true"

      - name: Move major release tag
        run: |
          set -euo pipefail
          major_tag="${GITHUB_REF_NAME%%.*}"
          git tag -f "$major_tag" "$GITHUB_SHA"
          git push origin "refs/tags/$major_tag" --force

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            ${{ steps.release-scenario-db.outputs.db-path }}
