name: "Test: Scenario Graph Matrix"
run-name: "Test Scenario Graph Matrix (executors: ${{ inputs.executors }})"

"on":
  workflow_dispatch:
    inputs:
      executors:
        description: Which executor matrix rows to include in this run.
        required: true
        default: ghcr-cleanup-manager
        type: choice
        options:
          - all
          - ghcr-cleanup-manager
          - ghcr-cleanup-action
          - ghcrctl
          - vlaurin-action-ghcr-prune
          - chizkiyahu-delete-untagged-ghcr-action
      upload_artifacts:
        description: Upload the final rescan DB artifact from inside the action.
        required: false
        default: true
        type: boolean
      artifact_retention_days:
        description: Optional artifact retention-days override for action-owned DB uploads.
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      executors:
        required: false
        default: ghcr-cleanup-manager
        type: string
      upload_artifacts:
        required: false
        default: true
        type: boolean
      artifact_retention_days:
        required: false
        default: ""
        type: string
      db_file:
        required: false
        default: ghcr-cleanup-manager-merged--scenario-graph-matrix-cleanup.sqlite
        type: string

permissions:
  contents: read
  packages: write
  actions: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Render graph scenario matrix
        id: matrix
        env:
          EXECUTORS: ${{ inputs.executors }}
        shell: bash
        run: |
          set -euo pipefail
          matrix_json="$(node tools/tests/render-graph-scenario-matrix.mjs)"
          if [[ "$EXECUTORS" != "all" ]]; then
            matrix_json="$(jq -c --arg executor "$EXECUTORS" '.include |= map(select(.executor == $executor))' <<< "$matrix_json")"
          fi
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  execute:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/test_scenario-executor.yml
    secrets: inherit
    with:
      scenario: ${{ matrix.scenario }}
      executor: ${{ matrix.executor }}
      upload_artifacts: ${{ inputs.upload_artifacts }}
      artifact_retention_days: ${{ inputs.artifact_retention_days }}
      package_name_suffix: ${{ matrix.executor }}

  bundle-db-artifacts:
    if: ${{ always() && inputs.upload_artifacts }}
    needs: execute
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Merge current-run graph scenario DB artifacts
        id: merge
        uses: ./merge-run-artifacts
        with:
          upload-artifacts: "true"
          db-file: ${{ inputs.db_file || 'ghcr-cleanup-manager-merged--scenario-graph-matrix-cleanup.sqlite' }}
          db-artifact-retention-days: ${{ inputs.artifact_retention_days }}
          delete-source-artifacts: "true"
          artifact-name-glob: "*.sqlite"

      - name: Print merged artifact outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "db-path: ${{ steps.merge.outputs.db-path }}"
          echo "artifact-id: ${{ steps.merge.outputs.artifact-id }}"
          echo "artifact-url: ${{ steps.merge.outputs.artifact-url }}"
          echo "artifact-digest: ${{ steps.merge.outputs.artifact-digest }}"
