name: "Test: Scenario Executor"
run-name: Test Scenario Executor (${{ inputs.scenario }} / ${{ inputs.executor }})

"on":
  workflow_dispatch:
    inputs:
      scenario:
        description: Dedicated scenario package to clear, seed, execute, and rescan.
        required: true
        default: delete-untagged-noop
        type: choice
        options:
          - delete-untagged-noop
          - tagged-fully-deletable
          - digest-fully-deletable
          - untag-only-single-shared-root
          - untag-only-multiarch-shared-root
          - docker-manifest-list-untag-only-shared-root
          - cosign-referrer-kept-multiarch
          - cosign-referrer-kept-multiarch-index-signature
          - blocked-shared-closure
          - delete-untagged-real
          - exclude-tag-protected-root
          - keep-n-tagged-overflow
          - keep-n-untagged-overflow
          - delete-tags-keep-n-tagged-overflow
          - delete-ghost-images-real
          - delete-ghost-images-noop
          - delete-partial-images-real
          - delete-partial-images-noop
          - delete-orphaned-images-real
          - delete-orphaned-images-noop
          - wildcard-tagged-fully-deletable
          - regex-untag-only-single-shared-root
      executor:
        description: Cleanup executor to run against the seeded scenario package.
        required: true
        default: ghcr-manager
        type: choice
        options:
          - ghcr-manager
          - ghcr-cleanup-action
      upload_db_artifact:
        description: Upload the final rescan DB artifact from inside the action.
        required: false
        default: true
        type: boolean
      artifact_retention_days:
        description: Optional artifact retention-days override for action-owned DB uploads.
        required: false
        default: ""
        type: string
      package_name_suffix:
        description: Optional package-name suffix for isolated parallel runs.
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      scenario:
        required: true
        type: string
      executor:
        required: true
        type: string
      upload_db_artifact:
        required: false
        default: true
        type: boolean
      artifact_retention_days:
        required: false
        default: ""
        type: string
      package_name_suffix:
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  actions: write
  id-token: write

jobs:
  execute:
    runs-on: ubuntu-latest
    concurrency:
      group: ghcr-manager__scenario__${{ inputs.scenario }}__${{ inputs.executor }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Require test org configuration
        shell: bash
        env:
          GHCR_TEST_OWNER: ${{ vars.GHCR_TEST_OWNER }}
          GHCR_TEST_PAT_USERNAME: ${{ vars.GHCR_TEST_PAT_USERNAME }}
          GHCR_TEST_PAT: ${{ secrets.GHCR_TEST_PAT }}
        run: |
          set -euo pipefail
          [[ -n "$GHCR_TEST_OWNER" ]] || { echo "Missing repo variable GHCR_TEST_OWNER" >&2; exit 1; }
          [[ -n "$GHCR_TEST_PAT_USERNAME" ]] || { echo "Missing repo variable GHCR_TEST_PAT_USERNAME" >&2; exit 1; }
          [[ -n "$GHCR_TEST_PAT" ]] || { echo "Missing repo secret GHCR_TEST_PAT" >&2; exit 1; }

      - name: Resolve scenario
        id: scenario
        shell: bash
        env:
          EXECUTOR: ${{ inputs.executor }}
          PACKAGE_NAME_SUFFIX: ${{ inputs.package_name_suffix }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          RUNNER_TEMP: ${{ runner.temp }}
          SCENARIO: ${{ inputs.scenario }}
          TEST_OWNER: ${{ vars.GHCR_TEST_OWNER }}
        run: |
          set -euo pipefail
          work_dir="$RUNNER_TEMP/ghcr-manager/scenario-${SCENARIO}-${EXECUTOR}"
          mkdir -p "$work_dir"
          resolution_path="$work_dir/scenario.json"
          node tools/tests/resolve-test-scenario.mjs "$SCENARIO" "$EXECUTOR" "$REPOSITORY_NAME" > "$resolution_path"
          summary_path="$work_dir/executor-summary.txt"
          package_name="$(jq -r '.packageName' "$resolution_path")"
          if [[ -n "$PACKAGE_NAME_SUFFIX" ]]; then
            package_name="${package_name}--${PACKAGE_NAME_SUFFIX}"
          fi
          db_file="${TEST_OWNER}__${package_name}__${EXECUTOR}__scan-history.sqlite"
          db_path="$work_dir/$db_file"
          echo "work_dir=$work_dir" >> "$GITHUB_OUTPUT"
          echo "resolution_path=$resolution_path" >> "$GITHUB_OUTPUT"
          echo "db_path=$db_path" >> "$GITHUB_OUTPUT"
          echo "summary_path=$summary_path" >> "$GITHUB_OUTPUT"
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "seed_strategy=$(jq -r '.seedStrategy' "$resolution_path")" >> "$GITHUB_OUTPUT"
          echo "digest_selector_tag_name_key=$(jq -r '.digestSelectorTagNameKey // ""' "$resolution_path")" >> "$GITHUB_OUTPUT"
          echo "image_ref=ghcr.io/${TEST_OWNER}/${package_name}" >> "$GITHUB_OUTPUT"

      - name: Clear scenario package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_TEST_PAT }}
          OWNER: ${{ vars.GHCR_TEST_OWNER }}
          PACKAGE: ${{ steps.scenario.outputs.package_name }}
        run: |
          set -euo pipefail
          node tools/tests/delete-ghcr-package.mjs "$OWNER" "$PACKAGE" "$GITHUB_TOKEN"

      - name: Seed scenario package
        uses: ./.github/actions/test-scenario-seed
        with:
          image_ref: ${{ steps.scenario.outputs.image_ref }}
          seed_strategy: ${{ steps.scenario.outputs.seed_strategy }}
          registry_username: ${{ vars.GHCR_TEST_PAT_USERNAME }}
          registry_password: ${{ secrets.GHCR_TEST_PAT }}

      - name: Set up Node.js for pre-scan
        if: ${{ inputs.executor == 'ghcr-cleanup-action' || steps.scenario.outputs.digest_selector_tag_name_key != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install repo CLI for pre-scan
        if: ${{ inputs.executor == 'ghcr-cleanup-action' || steps.scenario.outputs.digest_selector_tag_name_key != '' }}
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Scan before execution
        if: ${{ inputs.executor == 'ghcr-cleanup-action' || steps.scenario.outputs.digest_selector_tag_name_key != '' }}
        shell: bash
        run: |
          set -euo pipefail
          npm run ghcr-manager:dist -- scan \
            --db "${{ steps.scenario.outputs.db_path }}" \
            --owner "${{ vars.GHCR_TEST_OWNER }}" \
            --package "${{ steps.scenario.outputs.package_name }}" \
            --token "${{ secrets.GHCR_TEST_PAT }}"

      - name: Prepare cleanup action inputs
        id: cleanup-inputs
        shell: bash
        env:
          DB_PATH: ${{ steps.scenario.outputs.db_path }}
          EXECUTOR: ${{ inputs.executor }}
          RESOLUTION_PATH: ${{ steps.scenario.outputs.resolution_path }}
        run: |
          set -euo pipefail
          delete_untagged="$(jq -r '.dataaxiomInputs["delete-untagged"] // ""' "$RESOLUTION_PATH")"
          delete_tags="$(jq -r '.dataaxiomInputs["delete-tags"] // ""' "$RESOLUTION_PATH")"
          exclude_tags="$(jq -r '.dataaxiomInputs["exclude-tags"] // ""' "$RESOLUTION_PATH")"
          keep_n_tagged="$(jq -r '.dataaxiomInputs["keep-n-tagged"] // ""' "$RESOLUTION_PATH")"
          keep_n_untagged="$(jq -r '.dataaxiomInputs["keep-n-untagged"] // ""' "$RESOLUTION_PATH")"
          delete_ghost_images="$(jq -r '.dataaxiomInputs["delete-ghost-images"] // ""' "$RESOLUTION_PATH")"
          delete_partial_images="$(jq -r '.dataaxiomInputs["delete-partial-images"] // ""' "$RESOLUTION_PATH")"
          delete_orphaned_images="$(jq -r '.dataaxiomInputs["delete-orphaned-images"] // ""' "$RESOLUTION_PATH")"
          use_regex="$(jq -r '.dataaxiomInputs["use-regex"] // ""' "$RESOLUTION_PATH")"
          digest_selector_tag_name_key="$(jq -r '.digestSelectorTagNameKey // ""' "$RESOLUTION_PATH")"
          if [[ "$EXECUTOR" == "ghcr-cleanup-action" && -n "$digest_selector_tag_name_key" ]]; then
            delete_tags="$(node tools/tests/resolve-test-scenario-delete-digests.mjs "$RESOLUTION_PATH" "$DB_PATH")"
          elif [[ "$EXECUTOR" == "ghcr-manager" && -n "$digest_selector_tag_name_key" ]]; then
            delete_tags="$(jq -r --arg key "$digest_selector_tag_name_key" '.tagNames[$key] // ""' "$RESOLUTION_PATH")"
          fi
          echo "delete_untagged=$delete_untagged" >> "$GITHUB_OUTPUT"
          echo "keep_n_tagged=$keep_n_tagged" >> "$GITHUB_OUTPUT"
          echo "keep_n_untagged=$keep_n_untagged" >> "$GITHUB_OUTPUT"
          echo "delete_ghost_images=$delete_ghost_images" >> "$GITHUB_OUTPUT"
          echo "delete_partial_images=$delete_partial_images" >> "$GITHUB_OUTPUT"
          echo "delete_orphaned_images=$delete_orphaned_images" >> "$GITHUB_OUTPUT"
          # dataaxiom/ghcr-cleanup-action uses comma-separated where ghcr-manager uses newline-separated
          echo "use_regex=$use_regex" >> "$GITHUB_OUTPUT"
          {
            echo "delete_tags<<EOF"
            tr ',' '\n' <<< "$delete_tags"
            echo "EOF"
            echo "exclude_tags<<EOF"
            tr ',' '\n' <<< "$exclude_tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Execute with ghcr-manager action
        if: ${{ inputs.executor == 'ghcr-manager' }}
        uses: ./
        with:
          command: cleanup
          github-token: ${{ secrets.GHCR_TEST_PAT }}
          owner: ${{ vars.GHCR_TEST_OWNER }}
          package: ${{ steps.scenario.outputs.package_name }}
          db-path: ${{ steps.scenario.outputs.db_path }}
          upload-db-artifact: ${{ inputs.upload_db_artifact }}
          scan-after-cleanup: "true"
          db-artifact-retention-days: ${{ inputs.artifact_retention_days }}
          delete-untagged: ${{ steps.cleanup-inputs.outputs.delete_untagged }}
          delete-tags: ${{ steps.cleanup-inputs.outputs.delete_tags }}
          exclude-tags: ${{ steps.cleanup-inputs.outputs.exclude_tags }}
          keep-n-tagged: ${{ steps.cleanup-inputs.outputs.keep_n_tagged }}
          keep-n-untagged: ${{ steps.cleanup-inputs.outputs.keep_n_untagged }}
          delete-ghost-images: ${{ steps.cleanup-inputs.outputs.delete_ghost_images }}
          delete-partial-images: ${{ steps.cleanup-inputs.outputs.delete_partial_images }}
          delete-orphaned-images: ${{ steps.cleanup-inputs.outputs.delete_orphaned_images }}
          use-regex: ${{ steps.cleanup-inputs.outputs.use_regex }}

      - name: Record ghcr-manager executor summary
        if: ${{ inputs.executor == 'ghcr-manager' }}
        shell: bash
        env:
          SUMMARY_PATH: ${{ steps.scenario.outputs.summary_path }}
        run: |
          set -euo pipefail
          printf '%s\n' '{"executor":"ghcr-manager","status":"completed"}' > "$SUMMARY_PATH"

      - name: Execute with ghcr-cleanup-action action
        if: ${{ inputs.executor == 'ghcr-cleanup-action' }}
        uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86 # v1.1.0
        with:
          token: ${{ secrets.GHCR_TEST_PAT }}
          owner: ${{ vars.GHCR_TEST_OWNER }}
          package: ${{ steps.scenario.outputs.package_name }}
          delete-untagged: ${{ steps.cleanup-inputs.outputs.delete_untagged }}
          delete-tags: ${{ steps.cleanup-inputs.outputs.delete_tags }}
          exclude-tags: ${{ steps.cleanup-inputs.outputs.exclude_tags }}
          keep-n-tagged: ${{ steps.cleanup-inputs.outputs.keep_n_tagged }}
          keep-n-untagged: ${{ steps.cleanup-inputs.outputs.keep_n_untagged }}
          delete-ghost-images: ${{ steps.cleanup-inputs.outputs.delete_ghost_images }}
          delete-partial-images: ${{ steps.cleanup-inputs.outputs.delete_partial_images }}
          delete-orphaned-images: ${{ steps.cleanup-inputs.outputs.delete_orphaned_images }}
          use-regex: ${{ steps.cleanup-inputs.outputs.use_regex }}

      - name: Record upstream executor summary
        if: ${{ inputs.executor == 'ghcr-cleanup-action' }}
        shell: bash
        env:
          SUMMARY_PATH: ${{ steps.scenario.outputs.summary_path }}
        run: |
          set -euo pipefail
          printf '%s\n' '{"executor":"dataaxiom","status":"completed"}' > "$SUMMARY_PATH"

      - name: Scan after execution
        if: ${{ inputs.executor == 'ghcr-cleanup-action' }}
        uses: ./
        with:
          command: scan
          github-token: ${{ secrets.GHCR_TEST_PAT }}
          owner: ${{ vars.GHCR_TEST_OWNER }}
          package: ${{ steps.scenario.outputs.package_name }}
          db-path: ${{ steps.scenario.outputs.db_path }}
          upload-db-artifact: ${{ inputs.upload_db_artifact }}
          db-artifact-retention-days: ${{ inputs.artifact_retention_days }}

      - name: Assert scenario scan
        shell: bash
        run: |
          set -euo pipefail
          node tools/tests/assert-test-scenario-scan.mjs "${{ inputs.scenario }}" "${{ steps.scenario.outputs.db_path }}"

      - name: Assert cleanup audit persistence
        if: ${{ inputs.executor == 'ghcr-manager' }}
        shell: bash
        run: |
          set -euo pipefail
          node tools/tests/assert-test-scenario-cleanup-audit.mjs "${{ inputs.scenario }}" "${{ steps.scenario.outputs.db_path }}"
