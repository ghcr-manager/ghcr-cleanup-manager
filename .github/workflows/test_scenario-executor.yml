name: "Test: Scenario Executor"
run-name: Test Scenario Executor (${{ inputs.scenario }} / ${{ inputs.executor }})

"on":
  workflow_dispatch:
    inputs:
      scenario:
        description: Dedicated scenario package to clear, seed, execute, and rescan.
        required: true
        default: delete-untagged-noop
        type: choice
        options:
          - delete-untagged-noop
          - tagged-fully-deletable
          - digest-fully-deletable
          - untag-only-single-shared-root
          - untag-only-multiarch-shared-root
          - docker-manifest-list-untag-only-shared-root
          - cosign-referrer-kept-multiarch
          - cosign-referrer-kept-multiarch-index-signature
          - blocked-shared-closure
          - delete-untagged-real
          - exclude-tag-protected-root
          - keep-n-tagged-overflow
          - keep-n-untagged-overflow
          - delete-tags-keep-n-tagged-overflow
          - delete-ghost-images-real
          - delete-ghost-images-noop
          - delete-partial-images-real
          - delete-partial-images-noop
          - delete-orphaned-images-real
          - delete-orphaned-images-noop
          - wildcard-tagged-fully-deletable
          - regex-untag-only-single-shared-root
          - graph-1image-base
          - graph-1image-base--delete-image-a
          - graph-1image-attestations
          - graph-1image-attestations--delete-image-a
          - graph-1image-cosign
          - graph-1image-cosign--delete-image-a
          - graph-1image-cosign-attestations
          - graph-1image-cosign-attestations--delete-image-a
          - graph-2images-base
          - graph-2images-base--delete-image-a
          - graph-2images-base--delete-multiarch
          - graph-2images-base--delete-image-a-and-multiarch
          - graph-2images-attestations
          - graph-2images-attestations--delete-image-a
          - graph-2images-attestations--delete-multiarch
          - graph-2images-attestations--delete-image-a-and-multiarch
          - graph-2images-cosign
          - graph-2images-cosign--delete-image-a
          - graph-2images-cosign--delete-multiarch
          - graph-2images-cosign--delete-image-a-and-multiarch
          - graph-2images-cosign-attestations
          - graph-2images-cosign-attestations--delete-image-a
          - graph-2images-cosign-attestations--delete-multiarch
          - graph-2images-cosign-attestations--delete-image-a-and-multiarch
          - graph-2multiarch-base
          - graph-2multiarch-base--delete-image-a
          - graph-2multiarch-base--delete-multiarch-a
          - graph-2multiarch-base--delete-image-a-and-multiarch-a
          - graph-2multiarch-attestations
          - graph-2multiarch-attestations--delete-image-a
          - graph-2multiarch-attestations--delete-multiarch-a
          - graph-2multiarch-attestations--delete-image-a-and-multiarch-a
          - graph-2multiarch-cosign
          - graph-2multiarch-cosign--delete-image-a
          - graph-2multiarch-cosign--delete-multiarch-a
          - graph-2multiarch-cosign--delete-image-a-and-multiarch-a
          - graph-2multiarch-cosign-attestations
          - graph-2multiarch-cosign-attestations--delete-image-a
          - graph-2multiarch-cosign-attestations--delete-multiarch-a
          - graph-2multiarch-cosign-attestations--delete-image-a-and-multiarch-a
          - graph-2multiarch2tags-base--delete-untagged
          - graph-2multiarch2tags-base--delete-multiarch-a
          - graph-2multiarch2tags-attestations--delete-untagged
          - graph-2multiarch2tags-attestations--delete-multiarch-a
          - graph-2multiarch2tags-cosign--delete-untagged
          - graph-2multiarch2tags-cosign--delete-multiarch-a
          - graph-2multiarch2tags-cosign-attestations--delete-untagged
          - graph-2multiarch2tags-cosign-attestations--delete-multiarch-a
      executor:
        description: Cleanup executor to run against the seeded scenario package.
        required: true
        default: ghcr-cleanup-manager
        type: choice
        options:
          - ghcr-cleanup-manager
          - ghcr-cleanup-action
          - ghcrctl
          - vlaurin-action-ghcr-prune
          - chizkiyahu-delete-untagged-ghcr-action
      upload_artifacts:
        description: Upload the final rescan DB artifact from inside the action.
        required: false
        default: true
        type: boolean
      artifact_retention_days:
        description: Optional artifact retention-days override for action-owned DB uploads.
        required: false
        default: ""
        type: string
      package_name_suffix:
        description: Optional package-name suffix for isolated parallel runs.
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      scenario:
        required: true
        type: string
      executor:
        required: true
        type: string
      upload_artifacts:
        required: false
        default: true
        type: boolean
      artifact_retention_days:
        required: false
        default: ""
        type: string
      package_name_suffix:
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  actions: write
  id-token: write

jobs:
  execute:
    name: ${{ inputs.scenario }} / ${{ inputs.executor }}
    runs-on: ubuntu-latest
    concurrency:
      group: ghcr-cleanup-manager__scenario__${{ inputs.scenario }}__${{ inputs.executor }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Require test org configuration
        shell: bash
        env:
          GH_TEST_ORG: ${{ vars.GH_TEST_ORG }}
          GH_TEST_PAT_USERNAME: ${{ vars.GH_TEST_PAT_USERNAME }}
          GH_TEST_PAT: ${{ secrets.GH_TEST_PAT }}
        run: |
          set -euo pipefail
          [[ -n "$GH_TEST_ORG" ]] || { echo "Missing repo variable GH_TEST_ORG" >&2; exit 1; }
          [[ -n "$GH_TEST_PAT_USERNAME" ]] || { echo "Missing repo variable GH_TEST_PAT_USERNAME" >&2; exit 1; }
          [[ -n "$GH_TEST_PAT" ]] || { echo "Missing repo secret GH_TEST_PAT" >&2; exit 1; }

      - name: Resolve scenario
        id: scenario
        shell: bash
        env:
          EXECUTOR: ${{ inputs.executor }}
          PACKAGE_NAME_SUFFIX: ${{ inputs.package_name_suffix }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          RUNNER_TEMP: ${{ runner.temp }}
          SCENARIO: ${{ inputs.scenario }}
          TEST_OWNER: ${{ vars.GH_TEST_ORG }}
        run: |
          set -euo pipefail
          work_dir="$RUNNER_TEMP/ghcr-cleanup-manager/scenario-${SCENARIO}-${EXECUTOR}"
          mkdir -p "$work_dir"
          resolution_path="$work_dir/scenario.json"
          node tests/tools/resolve-test-scenario.mjs "$SCENARIO" "$EXECUTOR" "$REPOSITORY_NAME" > "$resolution_path"
          summary_path="$work_dir/executor-summary.txt"
          package_name="$(jq -r '.packageName' "$resolution_path")"
          if [[ -n "$PACKAGE_NAME_SUFFIX" ]]; then
            package_name="${package_name}--${PACKAGE_NAME_SUFFIX}"
          fi
          db_file="${TEST_OWNER}__${package_name}__${EXECUTOR}__scan-history.sqlite"
          db_path="$work_dir/$db_file"
          echo "work_dir=$work_dir" >> "$GITHUB_OUTPUT"
          echo "resolution_path=$resolution_path" >> "$GITHUB_OUTPUT"
          echo "db_path=$db_path" >> "$GITHUB_OUTPUT"
          echo "summary_path=$summary_path" >> "$GITHUB_OUTPUT"
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "seed_strategy=$(jq -r '.seedStrategy' "$resolution_path")" >> "$GITHUB_OUTPUT"
          echo "digest_selector_tag_name_key=$(jq -r '.digestSelectorTagNameKey // ""' "$resolution_path")" >> "$GITHUB_OUTPUT"
          echo "image_ref=ghcr.io/${TEST_OWNER}/${package_name}" >> "$GITHUB_OUTPUT"

      - name: Clear scenario package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TEST_PAT }}
          OWNER: ${{ vars.GH_TEST_ORG }}
          PACKAGE: ${{ steps.scenario.outputs.package_name }}
        run: |
          set -euo pipefail
          node tests/tools/delete-ghcr-package.mjs "$OWNER" "$PACKAGE" "$GITHUB_TOKEN"

      - name: Seed scenario package
        uses: ./.github/actions/test-scenario-seed
        with:
          image_ref: ${{ steps.scenario.outputs.image_ref }}
          seed_strategy: ${{ steps.scenario.outputs.seed_strategy }}
          registry_username: ${{ vars.GH_TEST_PAT_USERNAME }}
          registry_password: ${{ secrets.GH_TEST_PAT }}

      - name: Set up Node.js for pre-scan
        if:
          ${{ inputs.executor != 'ghcr-cleanup-manager' || steps.scenario.outputs.digest_selector_tag_name_key != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install repo CLI for pre-scan
        if:
          ${{ inputs.executor != 'ghcr-cleanup-manager' || steps.scenario.outputs.digest_selector_tag_name_key != '' }}
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Scan before execution
        if:
          ${{ inputs.executor != 'ghcr-cleanup-manager' || steps.scenario.outputs.digest_selector_tag_name_key != '' }}
        shell: bash
        run: |
          set -euo pipefail
          npm run ghcr-cleanup-manager:dist -- scan \
            --db "${{ steps.scenario.outputs.db_path }}" \
            --owner "${{ vars.GH_TEST_ORG }}" \
            --package "${{ steps.scenario.outputs.package_name }}" \
            --token "${{ secrets.GH_TEST_PAT }}"

      - name: Dispatch executor action
        uses: ./.github/actions/test-scenario-executor-dispatch
        with:
          executor: ${{ inputs.executor }}
          token: ${{ secrets.GH_TEST_PAT }}
          owner: ${{ vars.GH_TEST_ORG }}
          package_name: ${{ steps.scenario.outputs.package_name }}
          db_path: ${{ steps.scenario.outputs.db_path }}
          resolution_path: ${{ steps.scenario.outputs.resolution_path }}
          upload_artifacts: ${{ inputs.upload_artifacts }}
          artifact_retention_days: ${{ inputs.artifact_retention_days }}
          summary_path: ${{ steps.scenario.outputs.summary_path }}

      - name: Scan after execution
        if: ${{ inputs.executor != 'ghcr-cleanup-manager' }}
        uses: ./
        with:
          command: scan
          token: ${{ secrets.GH_TEST_PAT }}
          owner: ${{ vars.GH_TEST_ORG }}
          package: ${{ steps.scenario.outputs.package_name }}
          db-path: ${{ steps.scenario.outputs.db_path }}
          upload-artifacts: ${{ inputs.upload_artifacts }}
          db-artifact-retention-days: ${{ inputs.artifact_retention_days }}

      - name: Assert scenario scan
        shell: bash
        run: |
          set -euo pipefail
          node tests/tools/assert-test-scenario-scan.mjs "${{ inputs.scenario }}" "${{ steps.scenario.outputs.db_path }}"

      - name: Assert cleanup audit persistence
        if: ${{ inputs.executor == 'ghcr-cleanup-manager' }}
        shell: bash
        run: |
          set -euo pipefail
          node tests/tools/assert-test-scenario-cleanup-audit.mjs "${{ inputs.scenario }}" "${{ steps.scenario.outputs.db_path }}"
