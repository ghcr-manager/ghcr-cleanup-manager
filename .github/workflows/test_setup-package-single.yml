# Builds:
# - single: multi-arch manifest (tagged, with provenance and cosign signature)
#   - single-amd64: image (tagged, with provenance and cosign signature)
#   - single-arm64: image (tagged, with provenance and cosign signature)

name: "Test: Setup Package Single"

"on":
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  TEST_OWNER: ${{ vars.GHCR_TEST_OWNER }}
  IMAGE_REF: ghcr.io/${{ vars.GHCR_TEST_OWNER }}/${{ github.event.repository.name }}-test--single

jobs:
  build_amd64:
    name: Build image (amd64)
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Require test org configuration
        shell: bash
        env:
          GHCR_TEST_OWNER: ${{ vars.GHCR_TEST_OWNER }}
          GHCR_TEST_PAT_USERNAME: ${{ vars.GHCR_TEST_PAT_USERNAME }}
          GHCR_TEST_PAT: ${{ secrets.GHCR_TEST_PAT }}
        run: |
          set -euo pipefail
          [[ -n "$GHCR_TEST_OWNER" ]] || { echo "Missing repo variable GHCR_TEST_OWNER" >&2; exit 1; }
          [[ -n "$GHCR_TEST_PAT_USERNAME" ]] || { echo "Missing repo variable GHCR_TEST_PAT_USERNAME" >&2; exit 1; }
          [[ -n "$GHCR_TEST_PAT" ]] || { echo "Missing repo secret GHCR_TEST_PAT" >&2; exit 1; }

      - name: Build and test image
        id: build
        uses: ./.github/actions/test-registry-build-image
        with:
          image_ref: ${{ env.IMAGE_REF }}
          arch: amd64
          platform: linux/amd64
          registry_username: ${{ vars.GHCR_TEST_PAT_USERNAME }}
          registry_password: ${{ secrets.GHCR_TEST_PAT }}

  build_arm64:
    name: Build image (arm64)
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Require test org configuration
        shell: bash
        env:
          GHCR_TEST_OWNER: ${{ vars.GHCR_TEST_OWNER }}
          GHCR_TEST_PAT_USERNAME: ${{ vars.GHCR_TEST_PAT_USERNAME }}
          GHCR_TEST_PAT: ${{ secrets.GHCR_TEST_PAT }}
        run: |
          set -euo pipefail
          [[ -n "$GHCR_TEST_OWNER" ]] || { echo "Missing repo variable GHCR_TEST_OWNER" >&2; exit 1; }
          [[ -n "$GHCR_TEST_PAT_USERNAME" ]] || { echo "Missing repo variable GHCR_TEST_PAT_USERNAME" >&2; exit 1; }
          [[ -n "$GHCR_TEST_PAT" ]] || { echo "Missing repo secret GHCR_TEST_PAT" >&2; exit 1; }

      - name: Build and test image
        id: build
        uses: ./.github/actions/test-registry-build-image
        with:
          image_ref: ${{ env.IMAGE_REF }}
          arch: arm64
          platform: linux/arm64
          registry_username: ${{ vars.GHCR_TEST_PAT_USERNAME }}
          registry_password: ${{ secrets.GHCR_TEST_PAT }}

  publish:
    name: Publish multi-arch image
    needs:
      - build_amd64
      - build_arm64
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_TEST_PAT_USERNAME }}
          password: ${{ secrets.GHCR_TEST_PAT }}

      - name: Publish multi-arch image
        uses: gh-workflow/multiarch-image-publish@c5eac5dd8f7ed6b39fffc6e2c2242966b4917260 # 0.2.1
        with:
          image_ref: ${{ env.IMAGE_REF }}
          tags: |
            single
          platform_digests: |
            linux/amd64=${{ needs.build_amd64.outputs.digest }}
            linux/arm64=${{ needs.build_arm64.outputs.digest }}
          annotations: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=single
          publish_platform_tags: "true"

      - name: Print result
        run: |
          echo "Published ${{ env.IMAGE_REF }}:single"
