# Builds:
# - single: multi-arch manifest (tagged, with provenance and cosign signature)
#   - single-amd64: image (tagged, with provenance and cosign signature)
#   - single-arm64: image (tagged, with provenance and cosign signature)

name: "Test: Setup Package Single"

"on":
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  PACKAGE: ${{ github.event.repository.name }}-test--single
  IMAGE_REF: ghcr.io/${{ vars.GH_TEST_ORG }}/${{ github.event.repository.name }}-test--single

jobs:
  prepare-environment:
    name: Verify environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Require test org configuration
        shell: bash
        env:
          GH_TEST_ORG: ${{ vars.GH_TEST_ORG }}
          GH_TEST_PAT_USERNAME: ${{ vars.GH_TEST_PAT_USERNAME }}
          GH_TEST_PAT: ${{ secrets.GH_TEST_PAT }}
        run: |
          set -euo pipefail
          [[ -n "$GH_TEST_ORG" ]] || { echo "Missing repo variable GH_TEST_ORG" >&2; exit 1; }
          [[ -n "$GH_TEST_PAT_USERNAME" ]] || { echo "Missing repo variable GH_TEST_PAT_USERNAME" >&2; exit 1; }
          [[ -n "$GH_TEST_PAT" ]] || { echo "Missing repo secret GH_TEST_PAT" >&2; exit 1; }

      - name: Clear scenario package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TEST_PAT }}
          OWNER: ${{ vars.GH_TEST_ORG }}
        run: |
          set -euo pipefail
          node tools/tests/delete-ghcr-package.mjs "$OWNER" "$PACKAGE" "$GITHUB_TOKEN"

  build_dummy_last_tag:
    name: Build dummy image (last tag must remain)
    runs-on: ubuntu-latest
    needs: prepare-environment
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build keep-dummy image
        uses: ./.github/actions/test-registry-build-last-tag
        with:
          image_ref: ${{ env.IMAGE_REF }}
          registry_username: ${{ vars.GH_TEST_PAT_USERNAME }}
          registry_password: ${{ secrets.GH_TEST_PAT }}

  build_amd64:
    name: Build image (amd64)
    runs-on: ubuntu-latest
    needs:
      - prepare-environment
      - build_dummy_last_tag
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and test image
        id: build
        uses: ./.github/actions/test-registry-build-image
        with:
          image_ref: ${{ env.IMAGE_REF }}
          arch: amd64
          platform: linux/amd64
          registry_username: ${{ vars.GH_TEST_PAT_USERNAME }}
          registry_password: ${{ secrets.GH_TEST_PAT }}

  build_arm64:
    name: Build image (arm64)
    runs-on: ubuntu-24.04-arm
    needs:
      - prepare-environment
      - build_dummy_last_tag
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and test image
        id: build
        uses: ./.github/actions/test-registry-build-image
        with:
          image_ref: ${{ env.IMAGE_REF }}
          arch: arm64
          platform: linux/arm64
          registry_username: ${{ vars.GH_TEST_PAT_USERNAME }}
          registry_password: ${{ secrets.GH_TEST_PAT }}

  publish:
    name: Publish multi-arch image
    needs:
      - prepare-environment
      - build_dummy_last_tag
      - build_amd64
      - build_arm64
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ vars.GH_TEST_PAT_USERNAME }}
          password: ${{ secrets.GH_TEST_PAT }}

      - name: Publish multi-arch image
        uses: gh-workflow/multiarch-image-publish@c5eac5dd8f7ed6b39fffc6e2c2242966b4917260 # 0.2.1
        with:
          image_ref: ${{ env.IMAGE_REF }}
          tags: |
            single
          platform_digests: |
            linux/amd64=${{ needs.build_amd64.outputs.digest }}
            linux/arm64=${{ needs.build_arm64.outputs.digest }}
          annotations: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=single
          publish_platform_tags: "true"

      - name: Print result
        run: |
          echo "Published ${{ env.IMAGE_REF }}:single"
