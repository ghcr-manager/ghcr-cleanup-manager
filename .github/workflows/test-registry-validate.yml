name: Test Registry Validate
run-name: Test Registry Validate (${{ inputs.fixture }} / ${{ inputs.validation_scenario }})

"on":
  workflow_dispatch:
    inputs:
      fixture:
        description: Seeded test-registry fixture to validate against.
        required: true
        default: single
        type: choice
        options:
          - single
          - complex
      validation_scenario:
        description: Validation scenario to run against the seeded fixture.
        required: true
        default: all
        type: choice
        options:
          - all
          - delete-untagged
          - complex-tag-age-window
          - complex-tag-age-window-exclude-beta
          - complex-tag-age-window-keep-1
          - complex-shared-platform-tags-keep-1
      upload_db_artifact:
        description: Upload the SQLite DB produced by the scan.
        required: false
        default: true
        type: boolean
      db_artifact_encryption_passphrase:
        description: Optional passphrase for encrypting uploaded DB artifacts; required for non-public registries.
        required: false
        default: ""
        type: string
      upload_plan_artifact:
        description: Upload the `plan --delete-untagged` JSON output.
        required: false
        default: true
        type: boolean
      artifact_retention_days:
        description: Optional artifact retention-days override.
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      fixture:
        required: true
        type: string
      validation_scenario:
        required: false
        default: all
        type: string
      upload_db_artifact:
        required: false
        default: true
        type: boolean
      db_artifact_encryption_passphrase:
        required: false
        default: ""
        type: string
      upload_plan_artifact:
        required: false
        default: true
        type: boolean
      artifact_retention_days:
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: read
  actions: write

env:
  TEST_PACKAGE: ${{ github.event.repository.name }}-test--${{ inputs.fixture }}

jobs:
  validate:
    runs-on: ubuntu-latest
    concurrency:
      group: ghcr-manager__test-registry__${{ inputs.fixture }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Require test org configuration
        shell: bash
        env:
          GHCR_TEST_OWNER: ${{ vars.GHCR_TEST_OWNER }}
          GHCR_TEST_PAT: ${{ secrets.GHCR_TEST_PAT }}
        run: |
          set -euo pipefail
          [[ -n "$GHCR_TEST_OWNER" ]] || { echo "Missing repo variable GHCR_TEST_OWNER" >&2; exit 1; }
          [[ -n "$GHCR_TEST_PAT" ]] || { echo "Missing repo secret GHCR_TEST_PAT" >&2; exit 1; }

      - name: Run ghcr-manager action scan
        id: ghcr-manager
        uses: ./
        with:
          github-token: ${{ secrets.GHCR_TEST_PAT }}
          owner: ${{ vars.GHCR_TEST_OWNER }}
          package: ${{ env.TEST_PACKAGE }}
          upload-db-artifact: ${{ inputs.upload_db_artifact }}
          db-artifact-encryption-passphrase: ${{ inputs.db_artifact_encryption_passphrase }}
          db-artifact-retention-days: ${{ inputs.artifact_retention_days }}

      - name: Resolve validation scenarios
        id: scenarios
        shell: bash
        run: |
          set -euo pipefail
          scenario_list_path="${{ runner.temp }}/ghcr-manager/scenarios-${{ inputs.fixture }}.txt"
          mkdir -p "$(dirname "$scenario_list_path")"
          node tools/list-test-registry-validation-scenarios.mjs \
            "${{ inputs.fixture }}" \
            "${{ inputs.validation_scenario }}" \
            > "$scenario_list_path"
          echo "scenario_list_path=$scenario_list_path" >> "$GITHUB_OUTPUT"

      - name: Run plans and assertions
        id: validation
        shell: bash
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          set -euo pipefail
          plan_dir="$RUNNER_TEMP/ghcr-manager/plans-${{ inputs.fixture }}"
          mkdir -p "$plan_dir"
          while IFS= read -r scenario; do
            [[ -n "$scenario" ]] || continue
            plan_args_path="$RUNNER_TEMP/ghcr-manager/plan-args-${scenario}.txt"
            plan_path="$plan_dir/${scenario}.json"
            node tools/resolve-test-registry-validation.mjs \
              "$scenario" \
              "${{ inputs.fixture }}" \
              "${{ steps.ghcr-manager.outputs.db-path }}" \
              > "$plan_args_path"
            mapfile -t plan_args < "$plan_args_path"
            ghcr-manager plan \
              --db "${{ steps.ghcr-manager.outputs.db-path }}" \
              --owner "${{ vars.GHCR_TEST_OWNER }}" \
              --package "${{ env.TEST_PACKAGE }}" \
              "${plan_args[@]}" \
              | tee "$plan_path"
            node tools/assert-test-registry-plan.mjs \
              "$scenario" \
              "${{ inputs.fixture }}" \
              "${{ steps.ghcr-manager.outputs.db-path }}" \
              "$plan_path"
          done < "${{ steps.scenarios.outputs.scenario_list_path }}"
          echo "plan_dir=$plan_dir" >> "$GITHUB_OUTPUT"

      - name: Upload plan artifact
        if: ${{ inputs.upload_plan_artifact }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.TEST_PACKAGE }}__${{ inputs.validation_scenario }}-plans
          path: ${{ steps.validation.outputs.plan_dir }}
          retention-days:
            ${{ inputs.artifact_retention_days != '' && inputs.artifact_retention_days || github.retention_days }}

      - name: Print validation targets
        shell: bash
        run: |
          echo "Owner: ${{ vars.GHCR_TEST_OWNER }}"
          echo "Package: ${{ env.TEST_PACKAGE }}"
          echo "Validation scenario: ${{ inputs.validation_scenario }}"
          echo "DB path: ${{ steps.ghcr-manager.outputs.db-path }}"
          echo "Scenario list path: ${{ steps.scenarios.outputs.scenario_list_path }}"
          echo "Plan dir: ${{ steps.validation.outputs.plan_dir }}"
