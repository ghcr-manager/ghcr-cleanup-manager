name: "CI: Unit-test, lint"

"on":
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure workflow actions use immutable refs
        uses: joshjohanning/ensure-immutable-actions@28e5544cb61fef95d00ee312614a29c8e3a68a19 # v2.5.4
        with:
          include-first-party: "true"
          exclude-workflows: "manual-run_scan.yml"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Run tests
        run: |
          npm test

      - name: Run linters
        run: |
          scripts/lint.sh

      - name: Check links in markdown
        uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225 # v1.1.2
        with:
          use-verbose-mode: true
