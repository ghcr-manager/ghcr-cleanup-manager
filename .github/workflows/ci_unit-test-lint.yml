name: "CI: Unit-test, lint"

"on":
  workflow_call:
  workflow_dispatch:
    inputs:
      write-job-summary:
        description: "Controls job summary output"
        required: false
        default: "on-failure-only"
        type: choice
        options:
          - "on-failure-only"
          - "true"
permissions:
  contents: read

jobs:
  test-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Ensure workflow actions use immutable refs
        uses: joshjohanning/ensure-immutable-actions@9f5dad6bb6148bd29ff0d874de6a8cc70af08fa9 # v2.6.2
        with:
          include-first-party: "true"
          exclude-workflows: ".github/workflows/manual-run_scan.yml,test_scenario-executor.yml,test_scenario-executor-matrix.yml,test_scenario-graph-matrix.yml"
          write-job-summary: ${{ inputs.write-job-summary || 'on-failure-only' }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Run tests
        run: |
          npm test

      - name: Run linters
        run: |
          scripts/lint.sh

      - name: Check links in markdown
        uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225 # v1.1.2
        with:
          use-verbose-mode: true
