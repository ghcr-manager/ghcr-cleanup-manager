name: "Test: User Owner Cleanup"
run-name: Test User Owner Cleanup

"on":
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: Upload the final rescan DB artifact from inside the action.
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      upload_artifacts:
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    name: Clean up user-owned package
    runs-on: ubuntu-latest
    concurrency:
      group: ghcr-cleanup-manager__user-owner-cleanup

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Require user-owner test configuration
        shell: bash
        env:
          GH_TEST_PAT_USERNAME: ${{ vars.GH_TEST_PAT_USERNAME }}
          GH_TEST_PAT: ${{ secrets.GH_TEST_PAT }}
        run: |
          set -euo pipefail
          [[ -n "$GH_TEST_PAT_USERNAME" ]] || { echo "Missing repo variable GH_TEST_PAT_USERNAME" >&2; exit 1; }
          [[ -n "$GH_TEST_PAT" ]] || { echo "Missing repo secret GH_TEST_PAT" >&2; exit 1; }

      - name: Resolve variables
        shell: bash
        env:
          GH_TEST_PAT_USERNAME: ${{ vars.GH_TEST_PAT_USERNAME }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          set -euo pipefail
          PACKAGE_NAME="${{ github.event.repository.name }}-user-owner-test"
          PACKAGE_NAME="${PACKAGE_NAME,,}"
          IMAGE_REF="ghcr.io/${GH_TEST_PAT_USERNAME,,}/${PACKAGE_NAME}"
          DB_PATH="$RUNNER_TEMP/${GH_TEST_PAT_USERNAME,,}__${PACKAGE_NAME}__user-owner.sqlite"
          {
            echo "PACKAGE_NAME=$PACKAGE_NAME"
            echo "IMAGE_REF=$IMAGE_REF"
            echo "DB_PATH=$DB_PATH"
          } >> "$GITHUB_ENV"

      - name: Clear scenario package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TEST_PAT }}
          OWNER: ${{ vars.GH_TEST_PAT_USERNAME }}
          PACKAGE: ${{ env.PACKAGE_NAME }}
        run: |
          set -euo pipefail
          node tests/tools/delete-ghcr-package.mjs "$OWNER" "$PACKAGE" "$GITHUB_TOKEN"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ vars.GH_TEST_PAT_USERNAME }}
          password: ${{ secrets.GH_TEST_PAT }}

      - name: Seed two tagged images
        shell: bash
        env:
          IMAGE_REF: ${{ env.IMAGE_REF }}
        run: |
          set -euo pipefail

          keep_dir="$(mktemp -d)"
          cp tests/tools/fixtures/minimal-image/Dockerfile "$keep_dir/Dockerfile"
          printf '%s\n' "user-owner keep" > "$keep_dir/payload.txt"
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --push \
            --tag "$IMAGE_REF:keep-me" \
            "$keep_dir"

          delete_dir="$(mktemp -d)"
          cp tests/tools/fixtures/minimal-image/Dockerfile "$delete_dir/Dockerfile"
          printf '%s\n' "user-owner delete" > "$delete_dir/payload.txt"
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --push \
            --tag "$IMAGE_REF:delete-me" \
            "$delete_dir"

      - name: Run cleanup against user-owned package
        uses: ./
        with:
          command: cleanup
          token: ${{ secrets.GH_TEST_PAT }}
          owner: ${{ vars.GH_TEST_PAT_USERNAME }}
          package: ${{ env.PACKAGE_NAME }}
          db-path: ${{ env.DB_PATH }}
          upload-artifacts: ${{ inputs.upload_artifacts }}
          scan-after-cleanup: "true"
          delete-tags: |
            delete-me

      - name: Assert user-owner cleanup result
        shell: bash
        env:
          DB_PATH: ${{ env.DB_PATH }}
        run: |
          set -euo pipefail
          delete_count="$(sqlite3 "$DB_PATH" "select count(*) from tags where scan_id = (select scan_id from v_latest_scan_per_package limit 1) and tag = 'delete-me';")"
          keep_count="$(sqlite3 "$DB_PATH" "select count(*) from tags where scan_id = (select scan_id from v_latest_scan_per_package limit 1) and tag = 'keep-me';")"
          [[ "$delete_count" == "0" ]] || { echo "delete-me tag still present in DB" >&2; exit 1; }
          [[ "$keep_count" == "1" ]] || { echo "keep-me tag missing from DB" >&2; exit 1; }
