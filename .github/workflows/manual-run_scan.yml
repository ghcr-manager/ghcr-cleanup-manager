name: "Manual Run: Scan package"
run-name: Manual Run for ${{ inputs.owner }}/${{ inputs.package }}

"on":
  workflow_dispatch:
    inputs:
      owner:
        description: GHCR package owner (organization/user).
        required: true
        type: string
      package:
        description: GHCR package name.
        required: true
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      actions: write
    concurrency:
      group: ghcr-cleanup-manager__${{ inputs.owner }}__${{ inputs.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve GitHub token
        id: token
        shell: bash
        env:
          GH_TEST_ORG: ${{ vars.GH_TEST_ORG }}
          GH_TEST_PAT: ${{ secrets.GH_TEST_PAT }}
          INPUT_OWNER: ${{ inputs.owner }}
        run: |
          set -euo pipefail
          token="${{ github.token }}"
          if [[ -n "$GH_TEST_ORG" && "$INPUT_OWNER" == "$GH_TEST_ORG" ]]; then
            [[ -n "$GH_TEST_PAT" ]] || { echo "Missing repo secret GH_TEST_PAT for private test-org scan" >&2; exit 1; }
            token="$GH_TEST_PAT"
          fi
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Run ghcr-cleanup-manager action
        id: ghcr-cleanup-manager
        continue-on-error: true
        uses: ./
        with:
          command: scan
          token: ${{ steps.token.outputs.token }}
          owner: ${{ inputs.owner }}
          package: ${{ inputs.package }}
          upload-artifacts: true

      - name: Upload DB artifact
        if: ${{ always() && steps.ghcr-cleanup-manager.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: DB-after-error.sqlite
          path: ${{ steps.ghcr-cleanup-manager.outputs.db-path }}
          if-no-files-found: warn

      - name: Fail if scan failed
        if: ${{ steps.ghcr-cleanup-manager.outcome == 'failure' }}
        shell: bash
        run: |
          echo "Scan failed!" >&2
          exit 1
