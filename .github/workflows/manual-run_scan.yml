name: "Manual Run: Scan package"
run-name: Manual Run for ${{ inputs.owner }}/${{ inputs.package }}

"on":
  workflow_dispatch:
    inputs:
      owner:
        description: GHCR package owner (organization/user).
        required: true
        type: string
      package:
        description: GHCR package name.
        required: true
        type: string
      upload_artifacts:
        description: Upload scan DB artifact from inside the action.
        required: false
        default: true
        type: boolean
      db_artifact_retention_days:
        description: Optional artifact retention-days override.
        required: false
        default: ""
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      actions: write
    concurrency:
      group: ghcr-cleanup-manager__${{ inputs.owner }}__${{ inputs.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve GitHub token
        id: token
        shell: bash
        env:
          GH_TEST_ORG: ${{ vars.GH_TEST_ORG }}
          GH_TEST_PAT: ${{ secrets.GH_TEST_PAT }}
          INPUT_OWNER: ${{ inputs.owner }}
        run: |
          set -euo pipefail
          token="${{ github.token }}"
          if [[ -n "$GH_TEST_ORG" && "$INPUT_OWNER" == "$GH_TEST_ORG" ]]; then
            [[ -n "$GH_TEST_PAT" ]] || { echo "Missing repo secret GH_TEST_PAT for private test-org scan" >&2; exit 1; }
            token="$GH_TEST_PAT"
          fi
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Run ghcr-cleanup-manager action
        id: ghcr-cleanup-manager
        uses: ./
        with:
          command: scan
          token: ${{ steps.token.outputs.token }}
          owner: ${{ inputs.owner }}
          package: ${{ inputs.package }}
          upload-artifacts: ${{ inputs.upload_artifacts }}
          db-artifact-retention-days: ${{ inputs.db_artifact_retention_days }}

      - name: Print DB path
        shell: bash
        run: |
          echo "DB path: ${{ steps.ghcr-cleanup-manager.outputs.db-path }}"
