name: "CI: Change Validation"

"on":
  workflow_call:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: change-validation-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-suite:
    name: Unit tests and lint
    uses: ./.github/workflows/ci_unit-test-lint.yml
