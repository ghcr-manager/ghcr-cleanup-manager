name: "Test: Untag Executor"
run-name: Test Untag Executor (${{ inputs.scenario }})

"on":
  workflow_dispatch:
    inputs:
      scenario:
        description: Dedicated untag scenario package to clear, seed, untag, and rescan.
        required: true
        default: untag-one-of-two-tags-single-root
        type: choice
        options:
          - untag-single-tag-single-root
          - untag-one-of-two-tags-single-root
          - untag-one-of-two-tags-docker-manifest-list
      upload_db_artifact:
        description: Upload the final rescan DB artifact from inside the action.
        required: false
        default: true
        type: boolean
      artifact_retention_days:
        description: Optional artifact retention-days override for action-owned DB uploads.
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      scenario:
        required: true
        type: string
      upload_db_artifact:
        required: false
        default: true
        type: boolean
      artifact_retention_days:
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  actions: write
  id-token: write

jobs:
  execute:
    runs-on: ubuntu-latest
    concurrency:
      group: ghcr-manager__untag__${{ inputs.scenario }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Require test org configuration
        shell: bash
        env:
          GHCR_TEST_OWNER: ${{ vars.GHCR_TEST_OWNER }}
          GHCR_TEST_PAT_USERNAME: ${{ vars.GHCR_TEST_PAT_USERNAME }}
          GHCR_TEST_PAT: ${{ secrets.GHCR_TEST_PAT }}
        run: |
          set -euo pipefail
          [[ -n "$GHCR_TEST_OWNER" ]] || { echo "Missing repo variable GHCR_TEST_OWNER" >&2; exit 1; }
          [[ -n "$GHCR_TEST_PAT_USERNAME" ]] || { echo "Missing repo variable GHCR_TEST_PAT_USERNAME" >&2; exit 1; }
          [[ -n "$GHCR_TEST_PAT" ]] || { echo "Missing repo secret GHCR_TEST_PAT" >&2; exit 1; }

      - name: Resolve scenario
        id: scenario
        shell: bash
        env:
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          RUNNER_TEMP: ${{ runner.temp }}
          SCENARIO: ${{ inputs.scenario }}
          TEST_OWNER: ${{ vars.GHCR_TEST_OWNER }}
        run: |
          set -euo pipefail
          work_dir="$RUNNER_TEMP/ghcr-manager/untag-${SCENARIO}"
          mkdir -p "$work_dir"
          resolution_path="$work_dir/scenario.json"
          node tools/tests/resolve-untag-scenario.mjs "$SCENARIO" "$REPOSITORY_NAME" > "$resolution_path"
          package_name="$(jq -r '.packageName' "$resolution_path")"
          db_path="$work_dir/${TEST_OWNER}__${package_name}__untag__scan-history.sqlite"
          {
            echo "resolution_path=$resolution_path"
            echo "db_path=$db_path"
            echo "package_name=$package_name"
            echo "seed_strategy=$(jq -r '.seedStrategy' "$resolution_path")"
            echo "image_ref=ghcr.io/${TEST_OWNER}/${package_name}"
            echo "delete_tags<<EOF"
            jq -r '.deleteTags[]?' "$resolution_path"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Clear scenario package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_TEST_PAT }}
          OWNER: ${{ vars.GHCR_TEST_OWNER }}
          PACKAGE: ${{ steps.scenario.outputs.package_name }}
        run: |
          set -euo pipefail
          node tools/tests/delete-ghcr-package.mjs "$OWNER" "$PACKAGE" "$GITHUB_TOKEN"

      - name: Seed untag scenario package
        uses: ./.github/actions/test-scenario-seed
        with:
          image_ref: ${{ steps.scenario.outputs.image_ref }}
          seed_strategy: ${{ steps.scenario.outputs.seed_strategy }}
          registry_username: ${{ vars.GHCR_TEST_PAT_USERNAME }}
          registry_password: ${{ secrets.GHCR_TEST_PAT }}

      - name: Set up Node.js for pre-scan
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install repo CLI for pre-scan
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Scan before untag
        shell: bash
        run: |
          set -euo pipefail
          npm run ghcr-manager:dist -- scan \
            --db "${{ steps.scenario.outputs.db_path }}" \
            --owner "${{ vars.GHCR_TEST_OWNER }}" \
            --package "${{ steps.scenario.outputs.package_name }}" \
            --token "${{ secrets.GHCR_TEST_PAT }}"

      - name: Run ghcr-manager untag
        uses: ./
        with:
          command: untag
          github-token: ${{ secrets.GHCR_TEST_PAT }}
          owner: ${{ vars.GHCR_TEST_OWNER }}
          package: ${{ steps.scenario.outputs.package_name }}
          delete-tags: ${{ steps.scenario.outputs.delete_tags }}

      - name: Scan after untag
        uses: ./
        with:
          command: scan
          github-token: ${{ secrets.GHCR_TEST_PAT }}
          owner: ${{ vars.GHCR_TEST_OWNER }}
          package: ${{ steps.scenario.outputs.package_name }}
          db-path: ${{ steps.scenario.outputs.db_path }}
          upload-db-artifact: ${{ inputs.upload_db_artifact }}
          db-artifact-retention-days: ${{ inputs.artifact_retention_days }}

      - name: Assert direct untag results
        shell: bash
        run: |
          set -euo pipefail
          node tools/tests/assert-untag-scenario.mjs "${{ inputs.scenario }}" "${{ steps.scenario.outputs.db_path }}"

      - name: Assert untag scenario scan
        shell: bash
        run: |
          set -euo pipefail
          node tools/tests/assert-untag-scenario-scan.mjs "${{ inputs.scenario }}" "${{ steps.scenario.outputs.db_path }}"
