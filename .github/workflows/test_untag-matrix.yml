name: "Test: Untag Matrix"
run-name: Test Untag Matrix

"on":
  workflow_dispatch:
    inputs:
      upload_db_artifact:
        description: Upload the final rescan DB artifact from inside the action.
        required: false
        default: true
        type: boolean
      artifact_retention_days:
        description: Optional artifact retention-days override for action-owned DB uploads.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  actions: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Render untag matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          echo "matrix=$(node tools/tests/render-test-untag-matrix.mjs)" >> "$GITHUB_OUTPUT"

  execute:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/test_untag.yml
    secrets: inherit
    with:
      scenario: ${{ matrix.scenario }}
      upload_db_artifact: ${{ inputs.upload_db_artifact }}
      artifact_retention_days: ${{ inputs.artifact_retention_days }}

  bundle-db-artifacts:
    if: ${{ always() && inputs.upload_db_artifact }}
    needs: execute
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Merge current-run untag DB artifacts
        id: merge
        uses: ./merge-run-artifacts
        with:
          upload-db-artifact: "true"
          db-file: ghcr-manager-merged--scenario-matrix-untag.sqlite
          db-artifact-retention-days: ${{ inputs.artifact_retention_days }}
          delete-source-artifacts: "true"
          artifact-name-pattern: '\.sqlite$'

      - name: Print merged artifact outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "db-path: ${{ steps.merge.outputs.db-path }}"
          echo "artifact-id: ${{ steps.merge.outputs.artifact-id }}"
          echo "artifact-url: ${{ steps.merge.outputs.artifact-url }}"
          echo "artifact-digest: ${{ steps.merge.outputs.artifact-digest }}"
