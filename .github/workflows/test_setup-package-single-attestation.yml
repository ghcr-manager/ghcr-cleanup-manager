# Builds:
# - single: multi-arch manifest (tagged, with provenance, no cosign signature)
#   - single-amd64: image (tagged, with provenance, no cosign signature)
#   - single-arm64: image (tagged, with provenance and cosign signature)

name: "Test: Setup Package Single Attestation"

"on":
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  PACKAGE: ${{ github.event.repository.name }}-test--single-attestation
  IMAGE_REF: ghcr.io/${{ vars.GH_TEST_ORG }}/${{ github.event.repository.name }}-test--single-attestation

jobs:
  prepare-environment:
    name: Verify environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Require test org configuration
        shell: bash
        env:
          GH_TEST_ORG: ${{ vars.GH_TEST_ORG }}
          GH_TEST_PAT_USERNAME: ${{ vars.GH_TEST_PAT_USERNAME }}
          GH_TEST_PAT: ${{ secrets.GH_TEST_PAT }}
        run: |
          set -euo pipefail
          [[ -n "$GH_TEST_ORG" ]] || { echo "Missing repo variable GH_TEST_ORG" >&2; exit 1; }
          [[ -n "$GH_TEST_PAT_USERNAME" ]] || { echo "Missing repo variable GH_TEST_PAT_USERNAME" >&2; exit 1; }
          [[ -n "$GH_TEST_PAT" ]] || { echo "Missing repo secret GH_TEST_PAT" >&2; exit 1; }

      - name: Clear scenario package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TEST_PAT }}
          OWNER: ${{ vars.GH_TEST_ORG }}
        run: |
          set -euo pipefail
          node tests/tools/delete-ghcr-package.mjs "$OWNER" "$PACKAGE" "$GITHUB_TOKEN"

  build_dummy_last_tag:
    name: Build dummy image (last tag must remain)
    runs-on: ubuntu-latest
    needs: prepare-environment
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build keep-dummy image
        uses: ./.github/actions/test-registry-build-last-tag
        with:
          image_ref: ${{ env.IMAGE_REF }}
          registry_username: ${{ vars.GH_TEST_PAT_USERNAME }}
          registry_password: ${{ secrets.GH_TEST_PAT }}

  build_amd64:
    name: Build image (amd64)
    runs-on: ubuntu-latest
    needs:
      - prepare-environment
      - build_dummy_last_tag
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and test image
        id: build
        uses: ./.github/actions/test-registry-build-image
        with:
          image_ref: ${{ env.IMAGE_REF }}
          arch: amd64
          platform: linux/amd64
          registry_username: ${{ vars.GH_TEST_PAT_USERNAME }}
          registry_password: ${{ secrets.GH_TEST_PAT }}

  build_arm64:
    name: Build image (arm64)
    runs-on: ubuntu-24.04-arm
    needs:
      - prepare-environment
      - build_dummy_last_tag
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and test image
        id: build
        uses: ./.github/actions/test-registry-build-image
        with:
          image_ref: ${{ env.IMAGE_REF }}
          arch: arm64
          platform: linux/arm64
          registry_username: ${{ vars.GH_TEST_PAT_USERNAME }}
          registry_password: ${{ secrets.GH_TEST_PAT }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign arm64 image only
        shell: bash
        run: |
          set -euo pipefail
          cosign sign --yes "${{ env.IMAGE_REF }}@${{ steps.build.outputs.digest }}"

  publish:
    name: Publish multi-arch image
    needs:
      - prepare-environment
      - build_dummy_last_tag
      - build_amd64
      - build_arm64
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ vars.GH_TEST_PAT_USERNAME }}
          password: ${{ secrets.GH_TEST_PAT }}

      - name: Install regctl
        uses: regclient/actions/regctl-installer@1b705e32d40851370799ea5814e83d0a5f6a70dc # v0.1.0

      - name: Publish multi-arch image
        shell: bash
        run: |
          set -euo pipefail
          manifest_digest="$(
            docker buildx imagetools create \
              --dry-run \
              --annotation "index:org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
              --annotation "index:org.opencontainers.image.version=single" \
              "${{ env.IMAGE_REF }}@${{ needs.build_amd64.outputs.digest }}" \
              "${{ env.IMAGE_REF }}@${{ needs.build_arm64.outputs.digest }}" \
            | regctl manifest put \
                --by-digest \
                "${{ env.IMAGE_REF }}" \
                --format '{{ ( .Manifest.GetDescriptor ).Digest }}'
          )"

          regctl image copy "${{ env.IMAGE_REF }}@$manifest_digest" "${{ env.IMAGE_REF }}:single"
          regctl image copy \
            "${{ env.IMAGE_REF }}@${{ needs.build_amd64.outputs.digest }}" \
            "${{ env.IMAGE_REF }}:single-amd64"
          regctl image copy \
            "${{ env.IMAGE_REF }}@${{ needs.build_arm64.outputs.digest }}" \
            "${{ env.IMAGE_REF }}:single-arm64"

      - name: Print result
        run: |
          echo "Created package ${{ env.IMAGE_REF }}"
