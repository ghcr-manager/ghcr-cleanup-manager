name: "Test: Scenario Executor Matrix"
run-name: "Test Scenario Executor Matrix (executors: ${{ inputs.executors }})"

"on":
  workflow_dispatch:
    inputs:
      executors:
        description: Which executor matrix rows to include in this run.
        required: true
        default: ghcr-manager
        type: choice
        options:
          - all
          - ghcr-manager
          - ghcr-cleanup-action
      upload_db_artifact:
        description: Upload the final rescan DB artifact from inside the action.
        required: false
        default: true
        type: boolean
      artifact_retention_days:
        description: Optional artifact retention-days override for action-owned DB uploads.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  actions: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Render scenario matrix
        id: matrix
        env:
          EXECUTORS: ${{ inputs.executors }}
        shell: bash
        run: |
          set -euo pipefail
          matrix_json="$(node tools/tests/render-test-scenario-matrix.mjs)"
          if [[ "$EXECUTORS" != "all" ]]; then
            matrix_json="$(jq -c --arg executor "$EXECUTORS" '.include |= map(select(.executor == $executor))' <<< "$matrix_json")"
          fi
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  execute:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/test_scenario-executor.yml
    secrets: inherit
    with:
      scenario: ${{ matrix.scenario }}
      executor: ${{ matrix.executor }}
      upload_db_artifact: ${{ inputs.upload_db_artifact }}
      artifact_retention_days: ${{ inputs.artifact_retention_days }}
      package_name_suffix: ${{ matrix.executor }}

  bundle-db-artifacts:
    if: ${{ always() && inputs.upload_db_artifact }}
    needs: execute
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Merge current-run scenario DB artifacts
        id: merge
        uses: ./merge-run-artifacts
        with:
          upload-db-artifact: "true"
          db-file: ghcr-manager-merged--scenario-matrix-cleanup.sqlite
          db-artifact-retention-days: ${{ inputs.artifact_retention_days }}
          delete-source-artifacts: "true"
          artifact-name-pattern: '\.sqlite$'

      - name: Print merged artifact outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "db-path: ${{ steps.merge.outputs.db-path }}"
          echo "artifact-id: ${{ steps.merge.outputs.artifact-id }}"
          echo "artifact-url: ${{ steps.merge.outputs.artifact-url }}"
          echo "artifact-digest: ${{ steps.merge.outputs.artifact-digest }}"
