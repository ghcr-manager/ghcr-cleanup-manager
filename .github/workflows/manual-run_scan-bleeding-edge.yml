name: "Manual Run: Scan package (bleeding edge)"
run-name: Manual Run Test for ${{ inputs.owner }}/${{ inputs.package }}

"on":
  workflow_dispatch:
    inputs:
      owner:
        description: GHCR package owner (organization/user).
        required: true
        type: string
      package:
        description: GHCR package name.
        required: true
        type: string
      upload_db_artifact:
        description: Upload scan DB artifact from inside the action.
        required: false
        default: true
        type: boolean
      db_artifact_retention_days:
        description: Optional artifact retention-days override.
        required: false
        default: ""
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      actions: write
    concurrency:
      group: ghcr-manager__${{ inputs.owner }}__${{ inputs.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve GitHub token
        id: token
        shell: bash
        env:
          GHCR_TEST_OWNER: ${{ vars.GHCR_TEST_OWNER }}
          GHCR_TEST_PAT: ${{ secrets.GHCR_TEST_PAT }}
          INPUT_OWNER: ${{ inputs.owner }}
        run: |
          set -euo pipefail
          token="${{ github.token }}"
          if [[ -n "$GHCR_TEST_OWNER" && "$INPUT_OWNER" == "$GHCR_TEST_OWNER" ]]; then
            [[ -n "$GHCR_TEST_PAT" ]] || { echo "Missing repo secret GHCR_TEST_PAT for private test-org scan" >&2; exit 1; }
            token="$GHCR_TEST_PAT"
          fi
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Run ghcr-manager action
        id: ghcr-manager
        uses: ./
        with:
          command: scan
          github-token: ${{ steps.token.outputs.token }}
          owner: ${{ inputs.owner }}
          package: ${{ inputs.package }}
          upload-db-artifact: ${{ inputs.upload_db_artifact }}
          db-artifact-retention-days: ${{ inputs.db_artifact_retention_days }}

      - name: Print DB path
        shell: bash
        run: |
          echo "DB path: ${{ steps.ghcr-manager.outputs.db-path }}"
