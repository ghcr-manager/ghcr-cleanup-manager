name: Manual Run

"on":
  workflow_dispatch:
    inputs:
      owner:
        description: GHCR package owner (organization/user).
        required: true
        type: string
      package:
        description: GHCR package name.
        required: true
        type: string
      upload_db_artifact:
        description: Upload scan DB artifact from inside the action.
        required: false
        default: true
        type: boolean
      db_artifact_retention_days:
        description: Optional artifact retention-days override.
        required: false
        default: ""
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      actions: write
    concurrency:
      group: ghcr-manager__${{ inputs.owner }}__${{ inputs.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run ghcr-manager action
        id: ghcr-manager
        uses: gh-workflow/ghcr-manager@0.0.6
        with:
          github-token: ${{ github.token }}
          owner: ${{ inputs.owner }}
          package: ${{ inputs.package }}
          upload-db-artifact: ${{ inputs.upload_db_artifact }}
          db-artifact-retention-days: ${{ inputs.db_artifact_retention_days }}

      - name: Print DB path
        shell: bash
        run: |
          echo "DB path: ${{ steps.ghcr-manager.outputs.db-path }}"
