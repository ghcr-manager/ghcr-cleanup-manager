name: "Test: Delete Test Org Packages"
run-name: Test Delete Test Org Packages

"on":
  workflow_dispatch:
    inputs:
      confirm_test_org:
        description: Must exactly match GH_TEST_ORG to confirm deletion.
        required: true
        default: ""
        type: string
      package_name_contains:
        description: Optional literal substring used to filter package names before deletion.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Require test org configuration
        shell: bash
        env:
          CONFIRM_TEST_ORG: ${{ inputs.confirm_test_org }}
          GH_TEST_ORG: ${{ vars.GH_TEST_ORG }}
          GH_TEST_PAT: ${{ secrets.GH_TEST_PAT }}
        run: |
          set -euo pipefail
          [[ -n "$GH_TEST_ORG" ]] || { echo "Missing repo variable GH_TEST_ORG" >&2; exit 1; }
          [[ -n "$GH_TEST_PAT" ]] || { echo "Missing repo secret GH_TEST_PAT" >&2; exit 1; }
          [[ "$CONFIRM_TEST_ORG" == "$GH_TEST_ORG" ]] || {
            echo "confirm_test_org must exactly match GH_TEST_ORG." >&2
            exit 1
          }

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Delete matching test-org packages
        shell: bash
        env:
          GH_TEST_ORG: ${{ vars.GH_TEST_ORG }}
          GH_TEST_PAT: ${{ secrets.GH_TEST_PAT }}
          PACKAGE_NAME_CONTAINS: ${{ inputs.package_name_contains }}
        run: |
          set -euo pipefail
          node tests/tools/delete-ghcr-test-org-packages.mjs \
            "$GH_TEST_ORG" \
            "$GH_TEST_PAT" \
            "$PACKAGE_NAME_CONTAINS"
