name: GHCR Cleanup Manager DB Merge Action
description: Merge one or more GHCR Cleanup Manager SQLite databases into a single target database.

branding:
  icon: package
  color: blue

inputs:
  source-db-dir:
    description: Local directory containing the SQLite DB files to merge
    required: true
  db-file:
    description: Artifact filename and local filename for the merged database
    required: true
  upload-artifacts:
    description: Whether to upload the merged database as a workflow run artifact
    required: false
    default: "true"
  db-artifact-retention-days:
    description: Optional retention days override for uploaded database artifacts
    required: false
    default: ""
  log-level:
    description: Log level passed to the shared CLI
    required: false
    default: info

outputs:
  db-path:
    description: Path to the merged SQLite database in the GitHub action runner
    value: ${{ steps.prepare-db.outputs.db_path }}
  artifact-id:
    description: Artifact ID returned by the DB artifact upload action
    value: ${{ steps.upload.outputs.artifact-id }}
  artifact-url:
    description: Artifact download URL returned by the DB artifact upload action
    value: ${{ steps.upload.outputs.artifact-url }}
  artifact-digest:
    description: Artifact digest returned by the DB artifact upload action
    value: ${{ steps.upload.outputs.artifact-digest }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"
        cache: npm

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        npm ci

    - name: Build ghcr-cleanup-manager
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        npm run build

    - name: Prepare merge DB path
      id: prepare-db
      shell: bash
      env:
        INPUT_DB_FILE: ${{ inputs.db-file }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        set -euo pipefail
        db_dir="$(mktemp -d -p "$RUNNER_TEMP")"
        db_path="$db_dir/$INPUT_DB_FILE"
        echo "db_path=$db_path" >> "$GITHUB_OUTPUT"

    - name: Run DB merge
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        SOURCE_DB_DIR: ${{ inputs.source-db-dir }}
      run: |
        set -euo pipefail

        mapfile -t source_db_paths < <(find "$SOURCE_DB_DIR" -maxdepth 2 -type f -name '*.sqlite' | sort)
        if [[ "${#source_db_paths[@]}" -eq 0 ]]; then
          echo "No SQLite source DBs found under $SOURCE_DB_DIR." >&2
          exit 1
        fi

        merge_args=(
          --db "${{ steps.prepare-db.outputs.db_path }}"
        )

        for source_db_path in "${source_db_paths[@]}"; do
          merge_args+=(--source-db "$source_db_path")
        done

        npm run ghcr-cleanup-manager:dist -- db-merge "${merge_args[@]}"

    - name: Upload DB artifact
      id: upload
      if: ${{ inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.db-file }}
        path: ${{ steps.prepare-db.outputs.db_path }}
        retention-days:
          ${{ inputs.db-artifact-retention-days != '' && inputs.db-artifact-retention-days || github.retention_days }}
